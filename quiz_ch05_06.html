<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT 모의고사 — CH.05~06 디자인 트렌드 & 사용자 조사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --cream: #f7f3ec;
    --warm: #fdfaf5;
    --accent: #8b3a2a;
    --accent2: #c4614d;
    --gold: #b8924a;
    --gold-light: #d4b06a;
    --muted: #7a6e62;
    --border: #d9d0c4;
    --correct: #2d6a4f;
    --correct-bg: #d8f3dc;
    --wrong: #8b2a2a;
    --wrong-bg: #fde8e8;
    --opt-hover: #ede8df;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--ink);
    color: #fff;
    padding: 0 0;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 20px rgba(0,0,0,.3);
  }
  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    line-height: 1.4;
  }
  .header-sub {
    font-size: 10px;
    color: var(--gold-light);
    letter-spacing: .15em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .progress-wrap {
    flex: 1;
    max-width: 200px;
  }
  .progress-label {
    font-size: 11px;
    color: rgba(255,255,255,.5);
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
  }
  .progress-track {
    height: 4px;
    background: rgba(255,255,255,.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--gold));
    border-radius: 2px;
    transition: width .4s ease;
    width: 0%;
  }
  .score-display {
    text-align: right;
    font-size: 12px;
    color: rgba(255,255,255,.5);
    white-space: nowrap;
  }
  .score-num {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--gold-light);
    line-height: 1;
    display: block;
  }

  /* ── MAIN ── */
  .app-body {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--warm);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: box-shadow .2s;
    animation: fadeUp .35s ease both;
  }
  .q-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.07); }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .q-card:nth-child(1)  { animation-delay: .02s; }
  .q-card:nth-child(2)  { animation-delay: .04s; }
  .q-card:nth-child(3)  { animation-delay: .06s; }
  .q-card:nth-child(4)  { animation-delay: .08s; }
  .q-card:nth-child(5)  { animation-delay: .10s; }
  .q-card:nth-child(6)  { animation-delay: .12s; }
  .q-card:nth-child(7)  { animation-delay: .14s; }
  .q-card:nth-child(8)  { animation-delay: .16s; }
  .q-card:nth-child(9)  { animation-delay: .18s; }
  .q-card:nth-child(10) { animation-delay: .20s; }

  .q-head {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
    min-width: 32px;
    line-height: 1;
    padding-top: 2px;
  }
  .q-meta {
    flex: 1;
  }
  .q-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .q-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.75;
    color: var(--ink);
  }

  /* ── OPTIONS ── */
  .q-opts {
    padding: 6px 0 8px;
  }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 24px;
    cursor: pointer;
    transition: background .15s;
    border-bottom: 1px solid rgba(217,208,196,.3);
  }
  .opt:last-child { border-bottom: none; }
  .opt:hover:not(.disabled) { background: var(--opt-hover); }
  .opt.disabled { cursor: default; }

  .opt-label {
    min-width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    flex-shrink: 0;
    transition: all .2s;
    margin-top: 1px;
  }
  .opt-text {
    font-size: 13.5px;
    line-height: 1.7;
    color: #3a332c;
    padding-top: 2px;
  }

  /* ── STATES ── */
  .opt.correct {
    background: var(--correct-bg);
  }
  .opt.correct .opt-label {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }
  .opt.correct .opt-text { color: var(--correct); font-weight: 500; }

  .opt.wrong {
    background: var(--wrong-bg);
  }
  .opt.wrong .opt-label {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }
  .opt.wrong .opt-text { color: var(--wrong); }

  .opt.show-correct .opt-label {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }
  .opt.show-correct .opt-text { color: var(--correct); font-weight: 500; }

  /* ── EXPLANATION ── */
  .q-explain {
    display: none;
    padding: 14px 24px 18px 60px;
    border-top: 1px dashed var(--border);
    background: #f0ebe0;
  }
  .q-explain.show { display: block; }
  .explain-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .explain-text {
    font-size: 13px;
    line-height: 1.8;
    color: #3a332c;
  }

  /* ── RESULT BANNER ── */
  .result-banner {
    display: none;
    background: var(--ink);
    color: #fff;
    border-radius: 4px;
    padding: 32px 36px;
    margin-bottom: 28px;
    text-align: center;
    animation: fadeUp .5s ease;
  }
  .result-banner.show { display: block; }
  .result-score {
    font-family: 'DM Serif Display', serif;
    font-size: 56px;
    color: var(--gold-light);
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-label {
    font-size: 13px;
    color: rgba(255,255,255,.6);
    margin-bottom: 20px;
  }
  .result-grade {
    display: inline-block;
    padding: 6px 20px;
    border: 1px solid var(--gold);
    border-radius: 2px;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: .1em;
  }
  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 24px;
  }
  .rb-item { text-align: center; }
  .rb-num {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .rb-num.c { color: #74c69d; }
  .rb-num.w { color: #e07070; }
  .rb-label { font-size: 11px; color: rgba(255,255,255,.45); }

  /* ── SUBMIT BUTTON ── */
  .submit-row {
    text-align: center;
    margin-top: 28px;
  }
  .btn-submit {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px 48px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .05em;
    cursor: pointer;
    border-radius: 2px;
    transition: background .2s, transform .1s;
  }
  .btn-submit:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }

  .btn-retry {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--ink);
    padding: 10px 32px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 14px;
    transition: background .2s;
  }
  .btn-retry:hover { background: var(--ink); color: #fff; }

  /* ── FLOAT INDICATOR ── */
  .float-indicator {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: #fff;
    padding: 10px 16px;
    border-radius: 24px;
    font-size: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
    transition: opacity .3s;
  }
  .float-indicator span { color: var(--gold-light); font-weight: 600; }

  @media (max-width: 600px) {
    .header-inner { flex-wrap: wrap; }
    .progress-wrap { max-width: 100%; order: 3; flex: 1 0 100%; }
    .q-head { padding: 18px 16px 14px; }
    .q-opts { padding: 0; }
    .opt { padding: 12px 16px; }
    .q-explain { padding: 12px 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-title">
      <div class="header-sub">시각디자인기사 CBT</div>
      CH.05–06 디자인 트렌드 &amp; 사용자 조사
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>진행률</span>

    </div>
    <div class="score-display">
      <span class="score-num" id="scoreNum">—</span>
      점
    </div>
  </div>
</header>

<div class="app-body">

  <!-- RESULT BANNER -->
  <div class="result-banner" id="resultBanner">
    <div class="result-score" id="resultScore">0</div>
    <div class="result-label">25문항 · 문항당 4점</div>
    <div class="result-grade" id="resultGrade">—</div>
    <div class="result-breakdown">
      <div class="rb-item">
        <span class="rb-num c" id="rbCorrect">0</span>
        <span class="rb-label">정답</span>

      <div class="rb-item">

        <span class="rb-label">오답</span>
      </div>

        <span class="rb-num" id="rbSkip" style="color:rgba(255,255,255,.4)">0</span>
        <span class="rb-label">미응답</span>
      </div>
    </div>
  </div>

  <!-- QUESTIONS -->
  <div id="quizContainer"></div>

  <div class="submit-row" id="submitRow">
    <button class="btn-submit" id="btnSubmit" onclick="submitQuiz()">채점하기</button>
    <br>
    <button class="btn-retry" id="btnRetry" style="display:none" onclick="resetQuiz()">다시 풀기</button>
  </div>
</div>

<div class="float-indicator" id="floatIndicator">
  <span id="floatCount">0</span> / 25 응답 완료
</div>

let userAnswers = new Array(questions.length).fill(null);
let submitted = false;

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q${qi}`;

    const optionsHTML = q.options.map((opt, oi) => `
      <div class="opt" id="opt_${qi}_${oi}" onclick="selectOpt(${qi}, ${oi})">
        <div class="opt-label">${['①','②','③','④'][oi]}</div>
        <div class="opt-text">${opt}</div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="q-head">
        <div class="q-num">${String(qi+1).padStart(2,'0')}</div>
        <div class="q-meta">
          <div class="q-tag">${q.chapter}</div>
          <div class="q-text">${q.text}</div>
        </div>
      </div>
      <div class="q-opts">${optionsHTML}</div>
      <div class="q-explain" id="explain_${qi}">
        <div class="explain-label">📌 해설</div>
        <div class="explain-text">${q.explain}</div>
      </div>
    `;
    container.appendChild(card);
  });
  updateProgress();
}

function selectOpt(qi, oi) {
  if (submitted) return;
  userAnswers[qi] = oi;

  // Clear all opts for this question
  for (let i = 0; i < questions[qi].options.length; i++) {
    const el = document.getElementById(`opt_${qi}_${i}`);
    el.classList.remove('correct','wrong','show-correct');
  }

  // Mark selected
  const selected = document.getElementById(`opt_${qi}_${oi}`);
  selected.classList.add('correct'); // tentatively highlight as selected

  updateProgress();
}

function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  const pct = answered / questions.length * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${answered} / ${questions.length}`;
  document.getElementById('floatCount').textContent = answered;
}

function submitQuiz() {
  submitted = true;
  let correct = 0, wrong = 0, skip = 0;

  questions.forEach((q, qi) => {
    const ua = userAnswers[qi];
    const ans = q.answer;

    // Disable all opts
    for (let i = 0; i < q.options.length; i++) {
      const el = document.getElementById(`opt_${qi}_${i}`);
      el.classList.remove('correct','wrong','show-correct');
      el.classList.add('disabled');
    }

    if (ua === null) {
      skip++;
      // Show correct answer
      document.getElementById(`opt_${qi}_${ans}`).classList.add('show-correct');
    } else if (ua === ans) {
      correct++;
      document.getElementById(`opt_${qi}_${ua}`).classList.add('correct');
    } else {
      wrong++;
      document.getElementById(`opt_${qi}_${ua}`).classList.add('wrong');
      document.getElementById(`opt_${qi}_${ans}`).classList.add('show-correct');
    }

    // Show explanation
    document.getElementById(`explain_${qi}`).classList.add('show');
  });

  const score = correct * 4;
  let grade = '';
  if (score >= 80) grade = '🏆 우수 — 합격권';
  else if (score >= 60) grade = '✅ 양호 — 조금 더 노력!';
  else if (score >= 40) grade = '📖 보통 — 복습이 필요합니다';
  else grade = '⚠️ 미흡 — 반복 학습이 필요합니다';

  document.getElementById('resultScore').textContent = score + '점';
  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('rbCorrect').textContent = correct;
  document.getElementById('rbWrong').textContent = wrong;
  document.getElementById('rbSkip').textContent = skip;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('resultBanner').classList.add('show');
  document.getElementById('btnSubmit').style.display = 'none';
  document.getElementById('btnRetry').style.display = 'inline-block';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = '25 / 25';

  document.getElementById('resultBanner').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
  userAnswers = new Array(questions.length).fill(null);
  submitted = false;
  document.getElementById('resultBanner').classList.remove('show');
  document.getElementById('btnSubmit').style.display = '';
  document.getElementById('btnRetry').style.display = 'none';
  document.getElementById('scoreNum').textContent = '—';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
buildQuiz();
