<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시각디자인산업기사 필기 | DAY 03 기출문제 25선</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --ink: #1c1916;
    --ink2: #5c554d;
    --ink3: #9c9289;
    --accent: #c0392b;
    --accent-bg: #fdf0ee;
    --blue: #1a5faa;
    --blue-bg: #e8f0fa;
    --green: #1e7e4e;
    --green-bg: #e6f5ee;
    --border: #e2ddd6;
    --border2: #cdc8c0;
    --radius: 10px;
    --radius-sm: 6px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── 헤더 ── */
  .site-header {
    background: var(--ink);
    color: #fff;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  .header-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-inner h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
  }
  .header-inner p { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; }
  .score-chip {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── 진행 바 ── */
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,.15);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #e74c3c;
    transition: width .4s ease;
    width: 0%;
  }

  /* ── 컨테이너 ── */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* ── 결과 카드 ── */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    text-align: center;
    margin-bottom: 28px;
    display: none;
  }
  .result-card.show { display: block; }
  .result-score {
    font-family: 'Noto Serif KR', serif;
    font-size: 56px;
    font-weight: 900;
    color: var(--ink);
    line-height: 1;
  }
  .result-score span { font-size: 22px; font-weight: 400; color: var(--ink2); margin-left: 4px; }
  .result-msg { font-size: 15px; color: var(--ink2); margin-top: 10px; }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 24px;
  }
  .r-cell {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 14px 8px;
  }
  .r-cell .rv { font-size: 24px; font-weight: 700; color: var(--ink); }
  .r-cell .rl { font-size: 11px; color: var(--ink3); margin-top: 4px; }
  .retry-btn {
    margin-top: 20px;
    padding: 10px 28px;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    transition: background .15s;
  }
  .retry-btn:hover { background: var(--surface2); }

  /* ── 문제 카드 ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 14px;
    transition: border-color .2s;
  }
  .q-card.answered { border-color: var(--border2); }

  .q-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }
  .q-num {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: var(--ink2);
    margin-top: 1px;
  }
  .q-num.c { background: var(--green-bg); color: var(--green); border-color: #a8d8bc; }
  .q-num.w { background: var(--accent-bg); color: var(--accent); border-color: #f5bdb5; }

  .q-meta { flex: 1; }
  .q-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--blue);
    background: var(--blue-bg);
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 7px;
  }
  .q-text {
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--ink);
    font-weight: 400;
  }

  /* ── 선택지 ── */
  .options { display: flex; flex-direction: column; gap: 7px; }
  .opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    cursor: pointer;
    text-align: left;
    font-size: 13.5px;
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    transition: background .12s, border-color .12s;
    width: 100%;
  }
  .opt:hover:not([disabled]) { background: var(--surface2); border-color: var(--border2); }
  .opt-mark {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    color: var(--ink3);
    transition: background .12s, border-color .12s;
  }
  .opt.selected { border-color: var(--blue); background: var(--blue-bg); }
  .opt.selected .opt-mark { background: var(--blue); border-color: var(--blue); color: #fff; }
  .opt.correct-ans { border-color: var(--green) !important; background: var(--green-bg) !important; }
  .opt.correct-ans .opt-mark { background: var(--green); border-color: var(--green); color: #fff; }
  .opt.wrong-ans { border-color: var(--accent) !important; background: var(--accent-bg) !important; }
  .opt.wrong-ans .opt-mark { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── 해설 ── */
  .explain {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink2);
  }
  .explain.show { display: block; }
  .explain strong { color: var(--blue); }

  /* ── 채점 버튼 ── */
  .submit-area {
    text-align: center;
    margin-top: 28px;
  }
  .submit-btn {
    padding: 13px 48px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity .15s, transform .1s;
  }
  .submit-btn:hover { opacity: .85; }
  .submit-btn:active { transform: scale(.98); }
  .submit-btn:disabled { opacity: .35; cursor: default; }

  /* ── 반응형 ── */
  @media (max-width: 520px) {
    .header-inner h1 { font-size: 14px; }
    .result-score { font-size: 44px; }
    .q-card { padding: 18px 16px; }
    .container { padding: 20px 12px; }
  }
</style>
</head>
<body>

<!-- 헤더 -->
<header class="site-header">
  <div class="header-inner">
    <div>
      <h1>시각디자인산업기사 필기</h1>
      <p>DAY 03 · PART 02 디자인 자료화 — 기출문제 25선</p>
    </div>
    <div class="score-chip" id="live-score">0 / 25</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
</header>

<div class="container">

  <!-- 결과 카드 -->
  <div class="result-card" id="result-card">
    <div class="result-score" id="res-num">—<span>점</span></div>
    <div class="result-msg" id="res-msg"></div>
    <div class="result-grid">
      <div class="r-cell"><div class="rv" id="r-correct">—</div><div class="rl">정답</div></div>
      <div class="r-cell"><div class="rv" id="r-wrong">—</div><div class="rl">오답</div></div>
      <div class="r-cell"><div class="rv" id="r-pct">—</div><div class="rl">정답률</div></div>
    </div>
    <button class="retry-btn" onclick="resetQuiz()">↺ 다시 풀기</button>
  </div>

  <!-- 문제 목록 -->
  <div id="quiz-list"></div>

  <div class="submit-area">
    <button class="submit-btn" id="submit-btn" onclick="submitAll()">채점하기</button>
  </div>
</div>

<script>
const QUESTIONS = [
  /* ── CH01 프로젝트 결과보고서 ── */
  {
    q: "디자인 프로젝트 완료 시 개발사가 의뢰자에게 제출하는 서류의 명칭으로 옳은 것은?",
    tag: "CH01 결과보고서",
    opts: ["디자인 브리프(Design Brief)", "프로젝트 결과보고서(Project Results Report)", "기초자료분석서", "디자인 가이드(Design Guide)"],
    ans: 1,
    ex: "프로젝트 결과보고서(Project Results Report)는 개발 완료 후 의뢰자에게 제출하는 공식 문서입니다."
  },
  {
    q: "프로젝트 결과보고서에 포함되는 내용으로 옳지 않은 것은?",
    tag: "CH01 결과보고서",
    opts: ["조사, 분석, 개발, 전략, 일정 등을 보고한다", "제작비용을 보고하는 형태로 제작된다", "디자인 방향이 크게 바뀐 경우만 변경 내용을 기록한다", "프로젝트 일정 및 모든 개발내용을 한눈에 알아볼 수 있도록 정리한다"],
    ans: 2,
    ex: "작은 수정 내용도 구체적 산출물에 근거하여 정리해야 합니다. 크게 바뀐 경우만 기록하는 것은 틀린 설명입니다."
  },
  {
    q: "기초자료조사에 대한 설명으로 옳지 않은 것은?",
    tag: "CH01 기초자료조사",
    opts: ["의뢰자와 충분한 커뮤니케이션을 통해 필요한 정보를 수집하는 과정이다", "고객사의 신념, 가치, 디자인적 취향 등을 파악해야 한다", "설문이나 질문지를 활용하여 고객사가 원하는 바를 파악한다", "최종 인쇄물 제작이 완료된 이후에 진행한다"],
    ans: 3,

  },
  {
    q: "기초자료분석에 대한 설명으로 가장 옳은 것은?",
    tag: "CH01 기초자료분석",
    opts: ["기초자료분석은 최종 결과물을 제출한 이후에 진행한다", "수집한 자료를 분석하여 디자인 작업에 필요한 정보를 도출하는 과정이다", "기초자료분석은 클라이언트가 단독으로 수행한다", "기초자료분석은 인쇄물 제작 단계에서만 활용된다"],

  },
  /* ── CH01 디자인 전략 수립 ── */
  {
    q: "설정한 디자인 콘셉트에 맞는 이미지·색상·폰트 등을 조합하여 구성한 시각적 자료를 무엇이라 하는가?",
    tag: "CH01 디자인전략",
    opts: ["기초자료조사서", "이미지 보드(Image Board)", "브랜드 아키텍처", "결과보고서"],
    ans: 1,
    ex: "이미지 보드(Image Board)는 디자인 전략을 시각화한 자료로, 이해관계자들이 작업 방향을 명확히 이해하도록 돕습니다."
  },
  {
    q: "프로젝트를 시작하기 전에 클라이언트와 디자이너 등 담당자들이 목적·목표·타깃·예산 등을 정리·공유하는 문서 또는 회의는? (2023년 3회 산업기사)",
    tag: "CH01 디자인전략",
    opts: ["브리프(Brief)", "인덱스(Index)", "스키마(Schema)", "아카이브(Archive)"],
    ans: 0,
    ex: "브리프(Brief)는 프로젝트 진행 과정에서 발생할 수 있는 오해와 차이를 최소화하여 원활한 진행을 돕는 문서입니다."

  {
    q: "브랜드 아키텍처(brand architecture)에 대한 설명으로 옳은 것은?",

    opts: ["브랜드의 색상 팔레트를 정의한 시스템이다", "기업이 소유한 다양한 브랜드들의 상관관계와 구조를 나타내는 시스템이다", "디자인 작업의 순서를 정리한 가이드이다", "인쇄물 제작을 위한 규격 기준이다"],
    ans: 1,
    ex: "브랜드 아키텍처는 브랜드 포트폴리오를 구성하는 브랜드들 간의 관계를 이해하고 상호작용을 최적화하는 데 중요한 역할을 합니다."

    tag: "CH01 디자인전략",

    ans: 3,
    ex: "용지 규격은 인쇄물 제작 단계에서 결정되는 사항으로 전략 방향 가이드 항목이 아닙니다."
  },
  {
    q: "프로젝트 디자인 수립 단계에서 진행하는 내용으로 옳지 않은 것은?",

    opts: ["수집한 자료들에 대한 종합 분석을 진행한다", "경쟁 상황 분석과 미래 시장 상황을 예측해 본다", "브랜드 포지셔닝(positioning) 전략을 수립한다", "최종 인쇄물 검수 및 납품을 진행한다"],

  {

    ans: 3,

  },
  {
    q: "디자인 가이드(design guide)에 대한 설명으로 옳은 것은? (2024년 2회 산업기사)",
    tag: "CH01 디자인가이드",
    opts: ["한 번의 프로젝트에만 사용하고 폐기하는 단기 문서이다", "다양한 프로젝트에서 디자인 방향성과 시안 작업을 위해 제작되는 가이드이다", "디자인 가이드는 반드시 전문 교육을 받은 관리자만 활용할 수 있다", "디자인 가이드는 색상 정보만을 포함한다"],
    ans: 1,
    ex: "디자인 가이드는 교육을 받지 않은 관리자도 지침만으로 관리·활용이 가능하도록 만드는 것을 목적으로 합니다."
  },
  {

const LABELS = ['①','②','③','④'];
let answered = {};
let submitted = false;

function buildQuiz() {
  const list = document.getElementById('quiz-list');
  list.innerHTML = '';
  answered = {};
  submitted = false;
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('submit-btn').disabled = false;
  updateProgress();

  QUESTIONS.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qcard-' + qi;

    const optsHtml = q.opts.map((o, oi) =>
      `<button class="opt" id="opt-${qi}-${oi}" onclick="selectOpt(${qi},${oi})">
        <span class="opt-mark">${LABELS[oi]}</span>
        <span>${o}</span>
      </button>`
    ).join('');

    card.innerHTML = `
      <div class="q-top">
        <div class="q-num" id="qnum-${qi}">${qi + 1}</div>
        <div class="q-meta">
          <div class="q-tag">${q.tag}</div>
          <div class="q-text">${q.q}</div>
        </div>
      </div>
      <div class="options">${optsHtml}</div>
      <div class="explain" id="explain-${qi}"><strong>해설</strong> ${q.ex}</div>
    `;
    list.appendChild(card);
  });
}

function selectOpt(qi, oi) {
  if (submitted) return;
  answered[qi] = oi;

  QUESTIONS[qi].opts.forEach((_, idx) => {
    const btn = document.getElementById(`opt-${qi}-${idx}`);
    btn.classList.toggle('selected', idx === oi);
  });
  updateProgress();
}

function updateProgress() {
  const cnt = Object.keys(answered).length;
  const pct = Math.round(cnt / QUESTIONS.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('live-score').textContent = cnt + ' / ' + QUESTIONS.length;
}

function submitAll() {
  if (submitted) return;
  submitted = true;

  let correct = 0;
  QUESTIONS.forEach((q, qi) => {
    const sel = answered[qi];
    const isCorrect = (sel === q.ans);
    if (isCorrect) correct++;

    const numEl = document.getElementById('qnum-' + qi);
    numEl.classList.add(isCorrect ? 'c' : 'w');
    numEl.textContent = isCorrect ? '✓' : '✗';

    const card = document.getElementById('qcard-' + qi);
    card.classList.add('answered');

    q.opts.forEach((_, oi) => {
      const btn = document.getElementById(`opt-${qi}-${oi}`);
      btn.disabled = true;
      if (oi === q.ans) btn.classList.add('correct-ans');
      if (sel !== undefined && sel !== q.ans && oi === sel) btn.classList.add('wrong-ans');
    });

    document.getElementById('explain-' + qi).classList.add('show');
  });

  const wrong = QUESTIONS.length - correct;
  const pct = Math.round(correct / QUESTIONS.length * 100);
  const msgs = [
    [0, 40, '조금 더 학습이 필요해요. 해설을 꼼꼼히 읽어보세요!'],
    [40, 70, '절반 이상 맞췄어요! 틀린 문제를 다시 확인해 보세요.'],
    [70, 90, '잘 하고 있어요! 조금만 더 다듬으면 합격권입니다.'],
    [90, 101, '훌륭합니다! 거의 완벽한 점수예요.'],
  ];
  const msg = msgs.find(([lo, hi]) => pct >= lo && pct < hi)[2];

  document.getElementById('res-num').innerHTML = pct + '<span>점</span>';
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('r-correct').textContent = correct + '문제';
  document.getElementById('r-wrong').textContent = wrong + '문제';
  document.getElementById('r-pct').textContent = pct + '%';

  const rc = document.getElementById('result-card');
  rc.classList.add('show');
  rc.scrollIntoView({ behavior: 'smooth', block: 'start' });

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('live-score').textContent = correct + ' / ' + QUESTIONS.length + ' 정답';
  document.getElementById('prog-fill').style.width = '100%';
}

function resetQuiz() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(buildQuiz, 400);
}

buildQuiz();
