<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAY 04 · 지식재산권 CBT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0e0d;
    --card: #1a1917;
    --border: #2e2c29;
    --accent: #d4a853;
    --accent2: #8b6914;
    --text: #e8e4dc;
    --muted: #7a7469;
    --correct: #4a8c5c;
    --wrong: #8c3a3a;
    --correct-bg: #1a2e20;
    --wrong-bg: #2e1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 60px;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 720px;
    text-align: center;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .day-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    border: 1px solid var(--accent2);
    padding: 3px 10px;
    margin-bottom: 12px;
  }
  header h1 {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
  }
  header p {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 720px;
    margin-bottom: 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 720px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }

  .q-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 14px;
  }

  .q-text {
    font-size: clamp(14px, 3.5vw, 16px);
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 22px;
    word-break: keep-all;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(13px, 3vw, 14px);
    line-height: 1.6;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.15s, background 0.15s;
    word-break: keep-all;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(212,168,83,0.05);
  }
  .opt-btn .num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 18px;
    padding-top: 1px;
  }

  .opt-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #9dccad;
  }
  .opt-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: #cc9d9d;
  }
  .opt-btn:disabled { cursor: default; }

  /* ── EXPLANATION ── */
  .explanation {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    border-left: 3px solid var(--accent2);
    background: rgba(212,168,83,0.06);
    font-size: 13px;
    line-height: 1.8;
    color: #b8aa92;
    word-break: keep-all;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  /* ── NAV ── */
  .nav {
    width: 100%;
    max-width: 720px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .nav-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 10px 22px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn.primary:hover {
    background: var(--accent);
    color: var(--bg);
  }

  /* ── RESULT ── */
  #result-screen {
    display: none;
    width: 100%;
    max-width: 720px;
    text-align: center;
  }
  #result-screen.show { display: block; }

  .score-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }
  .score-num {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    color: var(--accent);
    font-weight: 500;
  }
  .score-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .result-msg {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .result-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .wrong-list {
    text-align: left;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 24px;
  }
  .wrong-list h3 {
    font-size: 13px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  .wrong-item {
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    word-break: keep-all;
  }
  .wrong-item:last-child { border-bottom: none; }
  .wrong-item span { color: var(--text); }

  .restart-btn {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    padding: 14px 36px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .restart-btn:hover { background: var(--accent); color: var(--bg); }

  /* ── QUIZ SCREEN ── */
  #quiz-screen { width: 100%; max-width: 720px; }

  .section-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 8px;
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<header>
  <div class="day-badge">DAY 04 · CHAPTER 03–04</div>
  <h1>지식재산권 확보 & 디자인 저작권 관리</h1>
  <p>시각디자인산업기사 · 컴퓨터그래픽운용기능사 대비</p>
</header>

<div class="progress-wrap" id="progress-wrap">
  <div class="progress-info">
    <span id="p-cur">1 / 30</span>
    <span id="p-score">맞힘 0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="p-fill" style="width:0%"></div></div>
</div>

<div id="quiz-screen">
  <div class="card">
    <div class="section-tag" id="q-section"></div>
    <div class="q-meta" id="q-meta"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="explanation" id="explanation"></div>
  </div>
  <div class="nav">
    <button class="nav-btn" id="prev-btn" onclick="go(-1)">◂ 이전</button>
    <button class="nav-btn primary" id="next-btn" onclick="go(1)">다음 ▸</button>
  </div>
</div>

<div id="result-screen">
  <div class="score-ring">
    <div class="score-num" id="r-score"></div>
    <div class="score-label">/ 50</div>
  </div>
  <div class="result-msg" id="r-msg"></div>
  <div class="result-sub" id="r-sub"></div>
  <div class="wrong-list" id="wrong-list"></div>
  <button class="restart-btn" onclick="restart()">↺ 다시 풀기</button>
</div>

<script>
const Q = [
  {
    section:"CH03 § 지식재산권 이해",
    text:"지식재산법 제1호 규정에서 '지식재산'으로 볼 수 없는 것은?",
    opts:["인간의 창조적 활동으로 창출된 지식·정보·기술","생물의 품종이나 유전자원","무형적인 것으로서 재산적 가치가 실현될 수 있는 것","토지·건물 등 유형의 부동산"],
    ans:3,
    exp:"지식재산은 인간의 창조적 활동 또는 경험 등으로 창출되거나 발견된 지식·정보·기술·사상이나 감정의 표현, 영업이나 물건의 표시, 생물의 품종이나 유전자원 등 재산적 가치가 있는 무형의 것을 말한다. 토지·건물 같은 유형의 부동산은 해당되지 않는다."
  },
  {
    section:"CH03 § 지식재산권 이해",
    text:"지식재산권의 특성으로 옳은 것은?",
    opts:["대부분 존속기간이 한정되어 있으며 현금화를 통해 합법적 절세를 받을 수 있다","존속기간이 없어 영구적으로 보호된다","유형의 재산만 보호하는 권리이다","지식재산권은 절세 혜택과 무관하다"],
    ans:0,
    exp:"지식재산권은 대부분 존속기간이 한정되어 있으며, 현금화를 통해 합법적 절세를 통한 감면혜택도 받을 수 있다."
  },
  {
    section:"CH03 § 지식재산권 확보의 중요성",
    text:"지식재산권 확보의 중요성 중 'R&D 투자비 회수 및 기술 개발의 원천'에 대한 설명으로 옳은 것은?",
    opts:["특허 보유 시 로열티 수입을 얻을 수 없다","지식재산권을 보유하면 막대한 기술개발 투자비를 회수하고, 추가 응용 기술개발이 가능하다","타인과의 분쟁 예방에만 효과가 있다","정부 보조금은 지식재산권과 무관하다"],
    ans:1,
    exp:"지식재산권을 보유하면 막대한 기술개발 투자비를 회수할 수 있다. 또한 확보된 권리를 기반으로 타인과의 분쟁 없이 추가 응용 기술개발이 가능하다."
  },
  {
    section:"CH03 § 지식재산권 구분",
    text:"지식재산권 구분표에서 특허권(Patent)의 권리기간으로 옳은 것은?",
    opts:["설정 등록일에 발생하여 출원일 후 20년까지 존속","설정 등록한 날부터 출원일 후 10년까지","저작자의 생존 시와 사후 70년까지","출원일 후 15년까지"],
    ans:0,
    exp:"특허권의 권리기간: 설정 등록일에 발생하여 출원일 후 20년까지 존속. 특허법 제88조에 근거."
  },
  {
    section:"CH03 § 지식재산권 구분",
    text:"실용신안권(Utility Model)의 권리기간으로 옳은 것은?",
    opts:["설정 등록한 날부터 출원일 후 10년까지 존속","설정 등록일에 발생하여 출원일 후 20년까지","출원일 후 15년까지","저작자 생존 시와 사후 70년"],
    ans:0,
    exp:"실용신안권: 설정 등록한 날부터 출원일 후 10년까지 존속. 실용신안법 제22조에 근거."
  },
  {
    section:"CH03 § 지식재산권 구분",
    text:"상표권(Trademark)의 특징으로 옳은 것은?",
    opts:["출원일 후 20년 고정","만료 시에 갱신절차를 거치면 지속적으로 유지 가능","저작자 사후 70년으로 한정","존속기간 연장이 불가능하다"],
    ans:1,
    exp:"상표권은 설정 등록일에 발생하여 출원일 후 10년까지 존속하지만, 만료 시에 갱신절차를 거치면 지속적으로 유지할 수 있다는 점이 다른 산업재산권과 구별되는 특징이다."
  },
  {
    section:"CH03 § 지식재산권 구분",
    text:"디자인인권(Design)의 권리기간으로 옳은 것은?",
    opts:["설정 등록일에 발생하여 출원일 후 10년까지","출원일 후 20년까지 존속","저작자 생존 시와 사후 70년","설정 등록한 날부터 출원일 후 20년까지"],
    ans:3,
    exp:"디자인권: 설정등록한 날부터 발생하여 디자인등록출원일 후 20년이 되는 날까지 존속한다. (디자인보호법 제91조)"
  },
  {
    section:"CH03 § 지식재산권 구분",
    text:"저작인접권의 권리기간으로 옳은 것은?",
    opts:["저작자의 생존 시와 사후 100년","저작자의 생존 시와 사후 70년까지 권리 존속, 방송은 50년으로 규정","출원일 후 20년까지","영구적으로 존속"],
    ans:1,
    exp:"저작인접권: 저작자의 생존 시와 사후 70년까지 권리 존속, 방송은 50년으로 규정."
  },
  {
    section:"CH03 § 지식재산권 구분",
    text:"신지식재산권 중 '정보재산권'에 해당하는 것은?",
    opts:["반도체 IC 배치설계, 생명공학기술","컴퓨터프로그램보호권, 소프트웨어","데이터베이스, 영업비밀, 뉴미디어","프랜차이징, 지리적 표시와 캐릭터, 도메인"],
    ans:2,
    exp:"신지식재산권 구분 — 첨단산업저작권: 반도체 IC 배치설계, 생명공학기술 / 산업저작권: 컴퓨터프로그램보호권, 소프트웨어 / 정보재산권: 데이터베이스, 영업비밀, 뉴미디어 / 기타: 프랜차이징, 지리적 표시와 캐릭터, 도메인, 색, 맛, 소리, 냄새 등"
  },
  {
    section:"CH03 § 산업재산권 구분",
    text:"특허권에 대한 설명으로 틀린 것은?",
    opts:["자연법칙을 이용한 기술적 사상의 창작(고도한 것)을 보호한다","이 법은 발명을 보호·장려하고 이용을 도모하여 기술의 발전을 촉진함을 목적으로 한다","라이프 사이클이 짧은 물품의 형상·구조·모형에 관한 고안을 보호한다","산업발전에 이바지함을 목적으로 한다"],
    ans:2,
    exp:"라이프 사이클이 짧은 물품의 형상·구조·모형에 관한 고안을 보호하는 것은 실용신안권이다. 특허권은 자연법칙을 이용한 기술적 사상의 창작으로서 고도한 것을 보호한다."
  },
  {
    section:"CH03 § 산업재산권 구분",
    text:"실용신안권에 대한 설명으로 옳은 것은?",
    opts:["특허보다 한 단계 높은 권리이다","발명한 것이 아닌 기존의 발명을 개선·보완했을 때 주는 권리이다","자연법칙을 이용한 고도한 기술적 창작을 보호한다","라이프 사이클이 긴 제품을 보호한다"],
    ans:1,
    exp:"실용신안권은 특허보다 한 단계 낮은 권리로, 발명한 것이 아닌 기존의 발명을 개선·보완했을 때 부여하는 권리이다. 라이프 사이클이 짧은 물품의 형상·구조·모형에 관한 고안을 보호한다(소발명)."
  },
  {

let cur = 0;
let answered = new Array(Q.length).fill(null); // null | index
let score = 0;

function render() {
  const q = Q[cur];
  document.getElementById('q-section').textContent = q.section;
  document.getElementById('q-meta').textContent = `문제 ${cur+1} / ${Q.length}`;
  document.getElementById('q-text').textContent = q.text;

  const wrap = document.getElementById('options');
  wrap.innerHTML = '';
  const nums = ['①','②','③','④'];
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="num">${nums[i]}</span><span>${o}</span>`;
    btn.onclick = () => pick(i);
    wrap.appendChild(btn);
  });

  const exp = document.getElementById('explanation');
  exp.className = 'explanation';
  exp.innerHTML = '';

  if (answered[cur] !== null) {
    applyStyle(answered[cur]);
  }

  updateProgress();
  document.getElementById('prev-btn').style.opacity = cur === 0 ? '0.3' : '1';
  document.getElementById('next-btn').textContent = cur === Q.length - 1 ? '결과 보기 ▸' : '다음 ▸';
}

function pick(i) {
  if (answered[cur] !== null) return;
  answered[cur] = i;
  if (i === Q[cur].ans) score++;
  applyStyle(i);
  updateProgress();
}

function applyStyle(chosen) {
  const q = Q[cur];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === chosen && chosen !== q.ans) b.classList.add('wrong');
  });
  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>해설</strong> ${q.exp}`;
  exp.classList.add('show');
}

function updateProgress() {
  const done = answered.filter(a => a !== null).length;
  const correct = answered.reduce((s, a, i) => s + (a === Q[i].ans ? 1 : 0), 0);
  document.getElementById('p-cur').textContent = `${cur+1} / ${Q.length}`;
  document.getElementById('p-score').textContent = `맞힘 ${correct}`;
  document.getElementById('p-fill').style.width = `${(done/Q.length)*100}%`;
}

function go(dir) {
  const next = cur + dir;
  if (next < 0) return;
  if (next >= Q.length) { showResult(); return; }
  cur = next;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const final = answered.reduce((s, a, i) => s + (a !== null && a === Q[i].ans ? 1 : 0), 0);
  const pct = Math.round((final/Q.length)*100);
  document.getElementById('r-score').textContent = final;
  document.getElementById('r-msg').textContent = pct >= 80 ? '🏆 우수합니다!' : pct >= 60 ? '📚 조금 더 다져요' : '💪 다시 도전!';
  document.getElementById('r-sub').textContent = `정답률 ${pct}% · ${final}/${Q.length} (80% 이상: 합격권)`;

  const wl = document.getElementById('wrong-list');
  const wrongs = Q.filter((q,i) => answered[i] !== q.ans);
  if (wrongs.length === 0) {
    wl.innerHTML = '<h3>WRONG LIST</h3><div class="wrong-item" style="color:#4a8c5c">모두 정답! 완벽합니다 🎉</div>';
  } else {
    wl.innerHTML = `<h3>WRONG LIST · ${wrongs.length}문제</h3>` +
      wrongs.map((q,i) => `<div class="wrong-item"><span>Q${Q.indexOf(q)+1}. ${q.text}</span><br>정답: ${['①','②','③','④'][q.ans]} ${q.opts[q.ans]}</div>`).join('');
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

function restart() {
  cur = 0;
  answered = new Array(Q.length).fill(null);
  score = 0;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  render();
}

render();
</script>
