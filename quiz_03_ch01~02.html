<title>DAY 05 · 사진재료·현상·인화 기출문제 30선</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222636;
  --border: #2d3148;
  --accent: #7c9ef5;
  --accent2: #5b7de8;
  --text: #e2e6f0;
  --text-muted: #98a3c0;
  --text-dim: #68728f;
  --good: #1f9d55;
  --bad: #d64545;
  --good-bg: rgba(31,157,85,0.18);
  --bad-bg: rgba(214,69,69,0.18);
  --card-shadow: 0 18px 40px rgba(0,0,0,.24);
}
body.light {
  --bg: #f4f6fb;
  --surface: #ffffff;
  --surface2: #eef2fb;
  --border: #d8deed;
  --accent: #355fd6;
  --accent2: #284cb8;
  --text: #1c2336;
  --text-muted: #5b6786;
  --text-dim: #8d96af;
  --good: #198754;
  --bad: #c73939;
  --good-bg: #e9f8f0;
  --bad-bg: #fdeeee;
  --card-shadow: 0 14px 32px rgba(29,41,71,.08);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  line-height: 1.7;
}
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;
  color: #fff;
  background: var(--accent2);
  border-radius: 999px;
  padding: 6px 12px;
}
.header-actions { display: flex; gap: 8px; }
.btn {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 14px;
  cursor: pointer;
  transition: .2s ease;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary {
  background: var(--accent2);
  color: #fff;
  border-color: var(--accent2);
}
.btn.primary:hover { filter: brightness(1.05); color: #fff; }
.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 18px 64px;
}
.hero {
  display: grid;
  grid-template-columns: 1.4fr .8fr;
  gap: 18px;
  margin-bottom: 26px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--card-shadow);
}
.hero-main {
  padding: 28px;
}
.hero h1 {
  margin: 0 0 10px;
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(28px, 4vw, 40px);
  line-height: 1.35;
}
.hero p {
  margin: 0;
  color: var(--text-muted);
}
.hero-side {
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 16px;
}
.meta-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.progress-bar {
  height: 10px;
  background: var(--surface2);
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.progress-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .25s ease;
}
.score-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.stat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
}
.stat .label {
  font-size: 12px;
  color: var(--text-dim);
}
.stat .value {
  font-size: 24px;
  font-weight: 700;
  margin-top: 4px;
}
.quiz-list {
  display: grid;
  gap: 18px;
}
.quiz-box {
  padding: 22px;
}
.quiz-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.quiz-no {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .08em;
}
.quiz-tag {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 999px;
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.quiz-question {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 14px;
}
.quiz-options {
  list-style: none;
  padding: 0;
  margin: 0;
  display: grid;
  gap: 10px;
}
.quiz-options li {
  border: 1px solid var(--border);
  background: var(--surface2);
  border-radius: 14px;
  padding: 12px 14px;
  cursor: pointer;
  transition: .18s ease;
}
.quiz-options li:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.quiz-options li.correct {
  border-color: var(--good);
  background: var(--good-bg);
}
.quiz-options li.wrong {
  border-color: var(--bad);
  background: var(--bad-bg);
}
.quiz-options li.disabled {
  pointer-events: none;
  opacity: .92;
}
.quiz-explanation {
  margin-top: 14px;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--surface2) 75%, transparent);
  display: none;
}
.quiz-explanation strong { color: var(--accent); }
.footer-box {
  margin-top: 28px;
  padding: 22px;
}
.result-text {
  color: var(--text-muted);
  margin-top: 6px;
}
.top-link {
  position: fixed;
  right: 22px;
  bottom: 22px;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  box-shadow: var(--card-shadow);
}
@media (max-width: 860px) {
  .hero { grid-template-columns: 1fr; }
  .header-inner { align-items: flex-start; flex-direction: column; }
}
</style>
</head>

const quizList = document.getElementById('quizList');
const solvedCount = document.getElementById('solvedCount');
const correctCount = document.getElementById('correctCount');
const wrongCount = document.getElementById('wrongCount');
const scoreText = document.getElementById('scoreText');
const progressFill = document.getElementById('progressFill');
const finalComment = document.getElementById('finalComment');
const resetBtn = document.getElementById('resetBtn');
const themeBtn = document.getElementById('themeBtn');

let solved = 0;
let correct = 0;
let wrong = 0;

function renderQuiz() {
  quizList.innerHTML = '';
  quizData.forEach(item => {
    const box = document.createElement('article');
    box.className = 'card quiz-box';
    box.innerHTML = `
      <div class="quiz-head">
        <div class="quiz-no">QUESTION ${item.no}</div>
        <div class="quiz-tag">${item.tag}</div>
      </div>
      <div class="quiz-question">${item.q}</div>
      <ul class="quiz-options">
        ${item.options.map((opt, idx) => `<li data-index="${idx}">${['①','②','③','④'][idx]} ${opt}</li>`).join('')}
      </ul>
      <div class="quiz-explanation"><strong>해설</strong><br>${item.explanation}</div>
    `;

    const options = box.querySelectorAll('li');
    const explanation = box.querySelector('.quiz-explanation');
    options.forEach((li, idx) => {
      li.addEventListener('click', () => {
        if (box.dataset.answered === 'true') return;
        box.dataset.answered = 'true';
        solved += 1;
        options.forEach(opt => opt.classList.add('disabled'));
        options[item.answer].classList.add('correct');
        if (idx === item.answer) {
          correct += 1;
        } else {
          wrong += 1;
          li.classList.add('wrong');
        }
        explanation.style.display = 'block';
        updateStats();
      });
    });

    quizList.appendChild(box);
  });
}

function updateStats() {
  solvedCount.textContent = solved;
  correctCount.textContent = correct;
  wrongCount.textContent = wrong;
  const score = Math.round((correct / quizData.length) * 100);
  scoreText.textContent = `${score}점`;
  progressFill.style.width = `${(solved / quizData.length) * 100}%`;

  if (solved === 0) {
    finalComment.textContent = '아직 문제를 풀기 전입니다. 위에서 1번부터 차근차근 풀어보세요.';
  } else if (solved < quizData.length) {
    finalComment.textContent = `현재 ${solved}문제를 풀었고 ${correct}문제 정답입니다. 끝까지 풀면 전체 점수를 바로 확인할 수 있습니다.`;
  } else {
    if (score >= 90) {
      finalComment.textContent = `훌륭합니다. ${score}점으로 매우 안정적인 점수입니다. 헷갈린 개념만 다시 보면 좋습니다.`;
    } else if (score >= 75) {
      finalComment.textContent = `좋습니다. ${score}점입니다. 틀린 문항의 해설을 다시 읽으면 실전 점수가 더 올라갑니다.`;
    } else if (score >= 60) {
      finalComment.textContent = `기본은 잡혀 있습니다. ${score}점입니다. 현상 순서, 정지·정착, 인화지 종류를 다시 복습해 보세요.`;
    } else {
      finalComment.textContent = `지금은 개념 재정리가 필요합니다. ${score}점입니다. 감광재료 특성, 현상품 기능, 후처리 개념부터 다시 보면 빠르게 올라갑니다.`;
    }
  }
}

resetBtn.addEventListener('click', () => {
  solved = 0;
  correct = 0;
  wrong = 0;
  renderQuiz();
  updateStats();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

themeBtn.addEventListener('click', () => {
  document.body.classList.toggle('light');
  themeBtn.textContent = document.body.classList.contains('light') ? '☀️ 테마' : '🌙 테마';
});

renderQuiz();
updateStats();
</script>
