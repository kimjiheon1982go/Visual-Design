<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시각디자인기사 2004-05-23 기출문제</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --sub: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --correct: #166534;
      --correct-bg: #dcfce7;
      --wrong: #991b1b;
      --wrong-bg: #fee2e2;
      --chip: #f3f4f6;
      --shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Malgun Gothic", "Noto Sans KR", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }
    .hero {
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 20px;
      position: sticky;
      top: 12px;
      z-index: 10;
    }
    .title {
      margin: 0 0 6px;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .desc {
      margin: 0;
      color: var(--sub);
      line-height: 1.6;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr .9fr .9fr .8fr;
      gap: 12px;
      margin-top: 18px;
    }
    .control {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }
    .control label {
      font-size: 12px;
      color: var(--sub);
      font-weight: 700;
    }
    .control input, .control select {
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 15px;
      width: 100%;
      color: var(--text);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .12s ease;
    }
    button:hover { transform: translateY(-1px); }
    .primary { background: var(--accent); color: #fff; box-shadow: 0 10px 22px rgba(37,99,235,.24); }
    .ghost { background: var(--chip); color: var(--text); }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 24px;
    }
    .stat {
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.85);
      box-shadow: var(--shadow);
      border-radius: 18px;
      padding: 14px 16px;
      min-width: 150px;
    }
    .stat .k {
      display: block;
      color: var(--sub);
      font-size: 12px;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .stat .v {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .subject-block { margin-top: 30px; }
    .subject-title {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 14px;
      letter-spacing: -0.02em;
    }
    .q-list { display: grid; gap: 14px; }
    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.85);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 20px;
    }
    .q-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .q-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 34px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      padding: 0 12px;
      flex-shrink: 0;
    }
    .q-text {
      flex: 1;
      font-size: 17px;
      line-height: 1.65;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .options { display: grid; gap: 10px; margin-top: 8px; }
    .option {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 14px;
      background: #fff;
      transition: border-color .12s ease, background .12s ease;
    }
    .option:hover { border-color: #c7d2fe; background: #fafbff; }
    .option input {
      margin-top: 3px;
      accent-color: var(--accent);
      transform: scale(1.08);
    }
    .option-label {
      font-size: 15px;
      line-height: 1.6;
      flex: 1;
    }
    .option-index {
      display: inline-block;
      min-width: 28px;
      color: var(--sub);
      font-weight: 700;
    }
    .correct {
      border-color: #86efac !important;
      background: var(--correct-bg) !important;
    }
    .wrong {
      border-color: #fca5a5 !important;
      background: var(--wrong-bg) !important;
    }
    .reveal {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--sub);
      font-size: 14px;
      display: none;
    }
    .reveal strong { color: var(--correct); }
    .footer-note {
      margin-top: 40px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.7;
    }
    @media (max-width: 880px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .wrap { padding: 18px 14px 60px; }
      .hero { position: static; padding: 20px; border-radius: 22px; }
      .toolbar { grid-template-columns: 1fr; }
      .q-head { flex-direction: column; }
      .q-text { font-size: 16px; }
      .card { padding: 16px; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 class="title">시각디자인기사 2014년 05월 25일 필기 기출문제</h1>
      <p class="desc">
        업로드한 PDF를 바탕으로 만든 HTML 문제집입니다. 과목별 정리, 검색, 과목 필터,
        채점 기능을 넣었고 정답은 채점 후에만 보이도록 구성했습니다.
      </p>

      <div class="toolbar">
        <div class="control">
          <label for="searchInput">문항 검색</label>
          <input id="searchInput" type="text" placeholder="키워드를 입력하세요" />
        </div>
        <div class="control">
          <label for="subjectFilter">과목 선택</label>
          <select id="subjectFilter">
            <option value="all">전체 과목</option>
            <option value="1과목 · 시각디자인론">1과목 · 시각디자인론</option>
            <option value="2과목 · 조형심리학">2과목 · 조형심리학</option>
            <option value="3과목 · 광고학">3과목 · 광고학</option>
            <option value="4과목 · 색채학">4과목 · 색채학</option>
            <option value="5과목 · 사진 및 인쇄제판론">5과목 · 사진 및 인쇄제판론</option>
          </select>
        </div>
        <div class="control">
          <label for="statusFilter">표시 방식</label>
          <select id="statusFilter">
            <option value="all">전체 보기</option>
            <option value="unanswered">미응답만 보기</option>
            <option value="answered">응답한 문제만 보기</option>
          </select>
        </div>
        <div class="control">
          <label>현재 상태</label>
          <div id="liveState" style="font-size:15px;font-weight:700;">문제 풀이 전</div>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="gradeBtn">채점하기</button>
        <button class="ghost" id="resetBtn">전체 초기화</button>
      </div>
    </section>

    <section class="stats">
      <div class="stat"><span class="k">전체 문항</span><span class="v" id="totalCount">100</span></div>
      <div class="stat"><span class="k">응답 수</span><span class="v" id="answeredCount">0</span></div>
      <div class="stat"><span class="k">정답 수</span><span class="v" id="correctCount">0</span></div>
      <div class="stat"><span class="k">점수</span><span class="v" id="scoreText">0점</span></div>
    </section>

    <div id="examRoot"></div>

    <p class="footer-note">
      출처 파일: 시각디자인기사20040523(교사용).pdf<br />
      이 HTML은 학습용으로 재구성한 버전입니다.
    </p>
  </div>

  <script>

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getSelected(qnum) {
      return document.querySelector(`input[name="q${qnum}"]:checked`);
    }

    function renderCard(q) {
      const correctOpt = q.options.find(o => o.idx === q.correct);
      const answerText = correctOpt ? `${correctOpt.label} ${correctOpt.text}` : '-';

      return `
        <article class="card" data-qnum="${q.num}">
          <div class="q-head">
            <span class="q-num">${q.num}번</span>
            <div class="q-text">${escapeHtml(q.question)}</div>
          </div>
          <div class="options">
            ${q.options.map(opt => `
              <label class="option" data-qnum="${q.num}" data-opt="${opt.idx}">
                <input type="radio" name="q${q.num}" value="${opt.idx}" onchange="handleSelect()" />
                <div class="option-label"><span class="option-index">${opt.label}</span> ${escapeHtml(opt.text)}</div>
              </label>
            `).join('')}
          </div>
          <div class="reveal" id="reveal-${q.num}">
            <strong>정답:</strong> ${escapeHtml(answerText)}
          </div>
        </article>
      `;
    }

    function render() {

      const subject = document.getElementById('subjectFilter').value;
      const status = document.getElementById('statusFilter').value;

          const searchOk = !search || searchTarget.includes(search) || String(q.num).includes(search);

        if (!items.length) return '';

        return `
          <section class="subject-block" data-subject="${subjectName}">
            <h2 class="subject-title">${subjectName}</h2>
            <div class="q-list">
              ${items.map(q => renderCard(q)).join('')}
            </div>
          </section>
        `;
      }).join('');

      if (graded) applyResultStyles();
      updateStats();
    }

    function clearStyles() {
      document.querySelectorAll('.option').forEach(el => el.classList.remove('correct', 'wrong'));
    }

    function applyResultStyles() {
      clearStyles();
      questions.forEach(q => {
        const selected = getSelected(q.num);
        const correctEl = document.querySelector(`.option[data-qnum="${q.num}"][data-opt="${q.correct}"]`);
        const reveal = document.getElementById(`reveal-${q.num}`);

        if (correctEl && graded) correctEl.classList.add('correct');

        if (graded && selected && Number(selected.value) !== q.correct) {
          const wrongEl = document.querySelector(`.option[data-qnum="${q.num}"][data-opt="${selected.value}"]`);
          if (wrongEl) wrongEl.classList.add('wrong');
        }

        if (reveal) reveal.style.display = graded ? 'block' : 'none';
      });
    }

    function updateStats() {
      const answered = questions.filter(q => getSelected(q.num)).length;
      let correct = 0;
      questions.forEach(q => {
        const selected = getSelected(q.num);
        if (selected && Number(selected.value) === q.correct) correct += 1;
      });

      document.getElementById('answeredCount').textContent = answered;
      document.getElementById('correctCount').textContent = graded ? correct : 0;
      document.getElementById('scoreText').textContent = graded ? `${correct}점` : '0점';
      document.getElementById('liveState').textContent =
        answered === 0 ? '문제 풀이 전' : `${graded ? '채점 완료' : '응답 중'} · ${answered} / 100`;
    }

    function handleSelect() {
      if (graded) applyResultStyles();
      updateStats();
    }
    window.handleSelect = handleSelect;

    document.getElementById('gradeBtn').addEventListener('click', () => {
      graded = true;
      applyResultStyles();
      updateStats();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.querySelectorAll('input[type="radio"]').forEach(el => { el.checked = false; });
      graded = false;
      clearStyles();
      document.querySelectorAll('.reveal').forEach(el => el.style.display = 'none');
      updateStats();
      document.getElementById('liveState').textContent = '문제 풀이 전';
    });

    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('subjectFilter').addEventListener('change', render);
    document.getElementById('statusFilter').addEventListener('change', render);

    render();
  </script>
</body>
</html>
