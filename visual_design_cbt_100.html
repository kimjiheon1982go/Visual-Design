<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시각디자인기사 CBT 100문항</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #5a5f7a;
    --gold: #f5c842;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
  .header-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; }

  .timer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--gold);
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.3);
    padding: 6px 14px;
    border-radius: 8px;
  }
  .timer.warning { color: var(--wrong); background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

  .score-badge {
    font-size: 13px; font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
  }
  .score-badge span { color: var(--accent); }

  /* ── TABS ── */
  .tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 10px 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(79,142,247,.06); }
  .tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,.03); }

  /* ── PROGRESS ── */
  .progress-bar {
    height: 3px;
    background: var(--border);
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .4s ease;
  }

  /* ── MAIN ── */
  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(79,142,247,.12);
    border: 1px solid rgba(79,142,247,.25);
    padding: 3px 9px;
    border-radius: 5px;
  }
  .q-subject-tag {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 5px;
    letter-spacing: .3px;
  }
  .q-text {
    font-size: 15.5px;
    font-weight: 400;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 20px;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 13px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all .18s;
    font-size: 14px;
    line-height: 1.55;
  }
  .option:hover { border-color: var(--accent); background: rgba(79,142,247,.07); }
  .option.selected { border-color: var(--accent); background: rgba(79,142,247,.13); }
  .option.correct { border-color: var(--correct); background: rgba(34,197,94,.12); }
  .option.wrong { border-color: var(--wrong); background: rgba(239,68,68,.12); }
  .option.reveal-correct { border-color: var(--correct); background: rgba(34,197,94,.08); }

  .opt-num {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    transition: all .18s;
  }
  .option.selected .opt-num { background: var(--accent); color: #fff; }
  .option.correct .opt-num { background: var(--correct); color: #fff; }
  .option.wrong .opt-num { background: var(--wrong); color: #fff; }
  .option.reveal-correct .opt-num { background: var(--correct); color: #fff; }

  /* ── EXPLANATION ── */
  .explanation {
    margin-top: 14px;
    padding: 14px 16px;
    background: rgba(79,142,247,.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  /* ── NAV ── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 8px;
  }
  .btn {
    padding: 10px 22px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all .18s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,.08); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #3a7de8; }
  .btn:disabled { opacity: .35; cursor: default; pointer-events: none; }

  .q-counter { font-size: 12px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }

  /* ── ANSWER SHEET ── */
  .answer-sheet {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .answer-sheet h3 { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
  .answer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
    gap: 6px;
  }
  .ans-dot {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text3);
  }
  .ans-dot.answered { background: rgba(79,142,247,.15); border-color: var(--accent); color: var(--accent); }
  .ans-dot.current { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ans-dot.correct-dot { background: rgba(34,197,94,.2); border-color: var(--correct); color: var(--correct); }
  .ans-dot.wrong-dot { background: rgba(239,68,68,.2); border-color: var(--wrong); color: var(--wrong); }

  /* ── RESULT SCREEN ── */
  .result-screen {
    display: none;
    max-width: 680px;
    margin: 40px auto;
    padding: 0 20px;
  }
  .result-screen.show { display: block; }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    text-align: center;
  }
  .result-grade {
    font-size: 72px;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .result-label { font-size: 14px; color: var(--text2); margin-bottom: 28px; }
  .result-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 10px;
  }
  .stat-val { font-size: 24px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .subject-scores { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .subj-row { display: flex; align-items: center; gap: 12px; }
  .subj-name { font-size: 12px; color: var(--text2); width: 160px; text-align: left; flex-shrink: 0; }
  .subj-bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .subj-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .8s ease; }
  .subj-pct { font-size: 12px; font-family: 'IBM Plex Mono', monospace; color: var(--text2); width: 40px; text-align: right; }

  .pass-badge {
    display: inline-block;
    font-size: 16px;
    font-weight: 700;
    padding: 8px 28px;
    border-radius: 50px;
    margin-bottom: 20px;
  }
  .pass-badge.pass { background: rgba(34,197,94,.15); border: 2px solid var(--correct); color: var(--correct); }
  .pass-badge.fail { background: rgba(239,68,68,.15); border: 2px solid var(--wrong); color: var(--wrong); }

  /* ── SPLASH ── */
  .splash {
    max-width: 640px;
    margin: 60px auto;
    padding: 0 20px;
    text-align: center;
  }
  .splash-icon { font-size: 56px; margin-bottom: 20px; }
  .splash h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .splash p { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 28px; }
  .splash-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .splash-subj {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: left;
  }
  .splash-subj .s-num { font-size: 10px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .splash-subj .s-name { font-size: 13px; font-weight: 600; }
  .splash-subj .s-count { font-size: 11px; color: var(--text3); margin-top: 2px; }

  @media (max-width: 600px) {
    .result-stats { grid-template-columns: repeat(2,1fr); }
    .splash-grid { grid-template-columns: 1fr; }
    .header { padding: 10px 14px; }
    .main { padding: 16px 12px 60px; }
    .q-card { padding: 18px; }
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-icon">✏️</div>
  <h1>시각디자인기사 필기 CBT</h1>
  <p>4개 과목 · 총 100문항 · 제한시간 150분<br>각 과목 40점 이상, 평균 60점 이상 합격</p>
  <div class="splash-grid">
    <div class="splash-subj">
      <div class="s-num">과목 1</div>
      <div class="s-name">디자인론</div>
      <div class="s-count">25문항</div>
    </div>
    <div class="splash-subj">
      <div class="s-num">과목 2</div>
      <div class="s-name">색채 및 도법</div>
      <div class="s-count">25문항</div>
    </div>
    <div class="splash-subj">
      <div class="s-num">과목 3</div>
      <div class="s-name">디자인사</div>
      <div class="s-count">25문항</div>
    </div>
    <div class="splash-subj">
      <div class="s-num">과목 4</div>
      <div class="s-name">컴퓨터그래픽스</div>
      <div class="s-count">25문항</div>
    </div>
  </div>
  <button class="btn primary" onclick="startExam()" style="width:100%;padding:14px;font-size:15px">시험 시작하기 →</button>
</div>

<!-- EXAM UI -->
<div id="examUI" style="display:none">
  <div class="header">
    <div>
      <div class="header-title">시각디자인기사 필기 CBT</div>
      <div class="header-sub" id="subjectLabel">과목 1 — 디자인론</div>
    </div>
    <div class="header-right">
      <div class="score-badge">정답 <span id="correctCount">0</span> / <span id="answeredCount">0</span></div>
      <div class="timer" id="timer">150:00</div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" onclick="switchSubject(0)" id="tab0">1과목 · 디자인론</div>
    <div class="tab" onclick="switchSubject(1)" id="tab1">2과목 · 색채및도법</div>
    <div class="tab" onclick="switchSubject(2)" id="tab2">3과목 · 디자인사</div>
    <div class="tab" onclick="switchSubject(3)" id="tab3">4과목 · 컴퓨터그래픽스</div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="main">
    <!-- Answer sheet -->
    <div class="answer-sheet">
      <h3>답안 현황</h3>
      <div class="answer-grid" id="answerGrid"></div>
    </div>

    <!-- Question card -->
    <div class="q-card" id="qCard">
      <div class="q-meta">
        <span class="q-num" id="qNum">Q01</span>
        <span class="q-subject-tag" id="qSubTag">디자인론</span>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="explanation" id="explanation"></div>
    </div>

    <div class="nav">
      <button class="btn" id="prevBtn" onclick="navigate(-1)">← 이전</button>
      <span class="q-counter" id="qCounter">1 / 25</span>
      <button class="btn" id="nextBtn" onclick="navigate(1)">다음 →</button>
    </div>

    <div style="text-align:center;margin-top:20px">
      <button class="btn" onclick="submitExam()" style="color:var(--gold);border-color:var(--gold)">🏁 채점하기</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="pass-badge" id="passBadge"></div>
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-label">평균 점수</div>
    <div class="result-stats" id="resultStats"></div>
    <div class="subject-scores" id="subjectScores"></div>
    <button class="btn primary" onclick="resetExam()" style="width:100%;margin-top:4px;padding:12px">다시 풀기</button>
  </div>
</div>

<script>
const SUBJECTS = ['디자인론','색채 및 도법','디자인사','컴퓨터그래픽스'];

const QUESTIONS = [
// ══════════════════════════════════════════════
// 과목 1: 디자인론 (Q1~25)
// ══════════════════════════════════════════════
{s:0,q:"디자인의 조형 원리 중 '변화와 통일'에 대한 설명으로 가장 적절한 것은?",
opts:["통일은 화면 전체에 동일한 요소를 반복하여 단조로움을 강조하는 원리이다","변화는 통일에 대한 상대적 개념으로, 동적이고 활기 있는 느낌을 부여한다","통일과 변화는 상호 배타적이므로 디자인에서 동시에 사용할 수 없다","변화만을 지나치게 추구하면 안정감이 증가한다"],
a:1, ex:"변화는 통일의 반대 개념으로, 리듬·강조·대비 등을 통해 동적인 느낌을 준다. 적절한 변화와 통일이 조화를 이룰 때 좋은 디자인이 완성된다."},

{s:0,q:"게슈탈트(Gestalt) 원리 중 '근접성의 법칙'에 해당하는 것은?",
opts:["유사한 형태의 요소들이 하나의 그룹으로 지각된다","서로 가까이 위치한 요소들이 하나의 집합으로 지각된다","불완전한 형태를 완성된 형태로 지각하려는 경향이다","연속적으로 이어지는 요소들을 하나의 흐름으로 지각한다"],
a:1, ex:"근접성(Proximity) 법칙은 물리적으로 가까운 요소들을 한 그룹으로 지각하는 원리다."},

{s:0,q:"디자인의 요소 중 '점(Point)'에 대한 설명으로 틀린 것은?",
opts:["점이 모이면 선이나 면으로 지각될 수 있다","점은 크기, 방향, 길이를 가지지 않는 위치만의 개념이다","점의 크기가 커지면 면의 성격을 띠게 된다","두 점이 있으면 서로를 연결하는 선을 연상하게 한다"],
a:1, ex:"점은 수학적으로 크기가 없으나, 조형에서는 상대적으로 작은 형태로 크기를 가지며 방향성도 맥락에 따라 부여될 수 있다."},

{s:0,q:"다음 중 디자인의 시각적 원리인 '율동(Rhythm)'을 가장 잘 설명한 것은?",
opts:["동일한 요소의 반복만으로 이루어진 단순 배열","요소의 반복, 점이, 강약 등을 통해 생기는 시각적 운동감","큰 요소와 작은 요소가 대립하여 긴장감을 형성하는 것","화면의 모든 요소가 균등하게 배치된 상태"],
a:1, ex:"율동은 반복(Repetition), 교차(Alternation), 점층(Gradation) 등 다양한 방법으로 시각적 흐름과 운동감을 만들어내는 원리이다."},

{s:0,q:"황금비(Golden Ratio)의 비율로 올바른 것은?",
opts:["1 : 1.414","1 : 1.618","1 : 1.732","1 : 2.000"],
a:1, ex:"황금비는 약 1:1.618(φ, 피)로, 고대 그리스 이후 자연과 예술에서 가장 아름다운 비율로 사용되어 왔다."},

// ── STATE ──
let currentSubject = 0;
let currentLocalIdx = 0;
let userAnswers = new Array(100).fill(-1);
let submitted = false;
let timerInterval = null;
let totalSeconds = 150 * 60;

function getSubjectQuestions(s) {
  return QUESTIONS.map((q,i)=>({...q,global:i})).filter(q=>q.s===s);
}

function globalIndex(s, localIdx) {
  return getSubjectQuestions(s)[localIdx].global;
}

function startExam() {
  document.getElementById('splash').style.display='none';
  document.getElementById('examUI').style.display='block';
  startTimer();
  renderAnswerGrid();
  renderQuestion();
}

function startTimer() {
  timerInterval = setInterval(()=>{
    totalSeconds--;
    const m = Math.floor(totalSeconds/60);
    const s = totalSeconds%60;
    const el = document.getElementById('timer');
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(totalSeconds<=300) el.classList.add('warning');
    if(totalSeconds<=0){ clearInterval(timerInterval); submitExam(); }
  },1000);
}

function switchSubject(s) {
  currentSubject = s;
  currentLocalIdx = 0;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===s));
  const labels = ['과목 1 — 디자인론','과목 2 — 색채 및 도법','과목 3 — 디자인사','과목 4 — 컴퓨터그래픽스'];
  document.getElementById('subjectLabel').textContent = labels[s];
  renderAnswerGrid();
  renderQuestion();
}

function renderAnswerGrid() {
  const sq = getSubjectQuestions(currentSubject);
  const grid = document.getElementById('answerGrid');
  grid.innerHTML = '';
  sq.forEach((q,i)=>{
    const dot = document.createElement('div');
    dot.className = 'ans-dot';
    dot.textContent = i+1;
    const gi = q.global;
    if(submitted){
      if(userAnswers[gi]===q.a) dot.classList.add('correct-dot');
      else if(userAnswers[gi]!==-1) dot.classList.add('wrong-dot');
    } else {
      if(i===currentLocalIdx) dot.classList.add('current');
      else if(userAnswers[gi]!==-1) dot.classList.add('answered');
    }
    dot.onclick = ()=>{ currentLocalIdx=i; renderAnswerGrid(); renderQuestion(); };
    grid.appendChild(dot);
  });
}

function renderQuestion() {
  const sq = getSubjectQuestions(currentSubject);
  const q = sq[currentLocalIdx];
  const gi = q.global;
  const total = sq.length;

  document.getElementById('qNum').textContent = `Q${String(gi+1).padStart(2,'0')}`;
  document.getElementById('qSubTag').textContent = SUBJECTS[q.s];
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qCounter').textContent = `${currentLocalIdx+1} / ${total}`;

  const fill = ((gi+1)/100*100).toFixed(1);
  document.getElementById('progressFill').style.width = fill+'%';

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.opts.forEach((opt,i)=>{
    const div = document.createElement('div');
    div.className = 'option';
    if(submitted){
      if(i===q.a) div.classList.add(userAnswers[gi]===i ? 'correct' : 'reveal-correct');
      else if(i===userAnswers[gi]) div.classList.add('wrong');
    } else {
      if(userAnswers[gi]===i) div.classList.add('selected');
    }
    div.innerHTML = `<div class="opt-num">${i+1}</div><div>${opt}</div>`;
    if(!submitted){
      div.onclick = ()=>{ userAnswers[gi]=i; updateScoreBadge(); renderAnswerGrid(); renderQuestion(); };
    }
    optDiv.appendChild(div);
  });

  const expDiv = document.getElementById('explanation');
  expDiv.innerHTML = `<strong>해설:</strong> ${q.ex}`;
  expDiv.className = 'explanation' + (submitted ? ' show' : '');

  document.getElementById('prevBtn').disabled = currentLocalIdx===0;
  document.getElementById('nextBtn').disabled = currentLocalIdx===total-1;

  updateScoreBadge();
}

function updateScoreBadge(){
  const answered = userAnswers.filter(a=>a!==-1).length;
  let correct = 0;
  if(submitted) QUESTIONS.forEach((q,i)=>{ if(userAnswers[i]===q.a) correct++; });
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('correctCount').textContent = submitted ? correct : userAnswers.filter(a=>a!==-1).length;
}

function navigate(dir) {
  const sq = getSubjectQuestions(currentSubject);
  currentLocalIdx = Math.max(0, Math.min(sq.length-1, currentLocalIdx+dir));
  renderAnswerGrid();
  renderQuestion();
}

function submitExam() {
  if(!submitted){
    const answered = userAnswers.filter(a=>a!==-1).length;
    if(answered < 100 && !confirm(`아직 ${100-answered}문항이 미답입니다. 채점하시겠습니까?`)) return;
  }
  clearInterval(timerInterval);
  submitted = true;
  document.getElementById('examUI').style.display='none';
  showResult();
}

function showResult() {
  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  // per-subject score
  const subScores = [0,1,2,3].map(s=>{
    const sq = getSubjectQuestions(s);
    const correct = sq.filter(q=>userAnswers[q.global]===q.a).length;
    return { correct, total: sq.length, pct: Math.round(correct/sq.length*100) };
  });
  const avg = Math.round(subScores.reduce((a,b)=>a+b.pct,0)/4);
  const allPass = subScores.every(s=>s.pct>=40) && avg>=60;

  document.getElementById('resultGrade').textContent = avg+'점';
  document.getElementById('passBadge').textContent = allPass ? '✅ 합격' : '❌ 불합격';
  document.getElementById('passBadge').className = 'pass-badge ' + (allPass?'pass':'fail');
  document.getElementById('resultLabel').textContent = '4과목 평균 점수';

  const totalCorrect = QUESTIONS.filter((q,i)=>userAnswers[i]===q.a).length;
  document.getElementById('resultStats').innerHTML = `
    <div class="stat-box"><div class="stat-val">${totalCorrect}</div><div class="stat-lbl">정답</div></div>
    <div class="stat-box"><div class="stat-val">${100-totalCorrect}</div><div class="stat-lbl">오답</div></div>
    <div class="stat-box"><div class="stat-val">${avg}점</div><div class="stat-lbl">평균</div></div>
    <div class="stat-box"><div class="stat-val">${allPass?'합격':'불합격'}</div><div class="stat-lbl">결과</div></div>
  `;

  const subNames = ['디자인론','색채및도법','디자인사','컴퓨터그래픽스'];
  document.getElementById('subjectScores').innerHTML = subScores.map((s,i)=>`
    <div class="subj-row">
      <div class="subj-name">과목${i+1} ${subNames[i]}</div>
      <div class="subj-bar-bg"><div class="subj-bar-fill" style="width:${s.pct}%;background:${s.pct>=40?'linear-gradient(90deg,var(--correct),#16a34a)':'linear-gradient(90deg,var(--wrong),#b91c1c)'}"></div></div>
      <div class="subj-pct">${s.correct}/${s.total}</div>
    </div>
  `).join('');
}

function resetExam() {
  userAnswers = new Array(100).fill(-1);
  submitted = false;
  totalSeconds = 150*60;
  currentSubject = 0;
  currentLocalIdx = 0;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('examUI').style.display='block';
  document.getElementById('timer').classList.remove('warning');
  document.getElementById('timer').textContent='150:00';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  document.getElementById('subjectLabel').textContent='과목 1 — 디자인론';
  startTimer();
  renderAnswerGrid();
  renderQuestion();
}
</script>
</body>
</html>
