<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시각디자인 기사 필기 — 학습 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --bg2: #16161a;
    --bg3: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0eee8;
    --text2: #a09e98;
    --text3: #5e5c57;
    --p1: #7f77dd;
    --p1b: #2a2548;
    --p2: #1d9e75;
    --p2b: #0c3326;
    --p3: #378add;
    --p3b: #0c2a44;
    --p4: #ba7517;
    --p4b: #3a2308;
    --p5: #d85a30;
    --p5b: #3d1a0c;
    --done: #2a2a30;
    --done-text: #4a4855;
    --radius: 10px;
    --radius-sm: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; }
  .title { font-size: 15px; font-weight: 500; color: var(--text); }
  .dday-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--p5b);
    color: var(--p5);
    border: 1px solid rgba(216,90,48,0.3);
    border-radius: 20px;
    padding: 3px 12px;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .prog-wrap { display: flex; align-items: center; gap: 8px; }
  .prog-bar { width: 120px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--p1); border-radius: 2px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .prog-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); min-width: 32px; }
  .reset-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { color: var(--text2); border-color: var(--border2); background: var(--bg3); }

  /* ── main layout ── */
  .main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  /* ── view toggle ── */
  .view-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 28px;
    width: fit-content;
  }
  .view-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text3);
    background: none;
    border: none;
    padding: 7px 18px;
    cursor: pointer;
    transition: all 0.15s;
    border-right: 1px solid var(--border2);
  }
  .view-btn:last-child { border-right: none; }
  .view-btn.active { background: var(--bg3); color: var(--text); }
  .view-btn:hover:not(.active) { color: var(--text2); }

  /* ── calendar grid ── */
  .cal-section { display: none; }
  .cal-section.active { display: block; }
  .list-section { display: none; }
  .list-section.active { display: block; }

  .month-block { margin-bottom: 40px; }
  .month-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 14px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day-header {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    padding: 6px 0;
    letter-spacing: 0.06em;
  }
  .day-cell {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    min-height: 100px;
    padding: 8px 8px 6px;
    position: relative;
    cursor: default;
    transition: border-color 0.15s;
  }
  .day-cell.has-tasks { cursor: pointer; }
  .day-cell.has-tasks:hover { border-color: var(--border2); }
  .day-cell.empty { background: transparent; border-color: transparent; }
  .day-cell.today { border-color: rgba(127,119,221,0.5); }
  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .today-dot {
    width: 5px; height: 5px;
    background: var(--p1);
    border-radius: 50%;
  }
  .task-chip {
    display: block;
    font-size: 10px;
    line-height: 1.3;
    padding: 3px 5px;
    border-radius: 4px;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.15s;
  }
  .task-chip.done-chip { opacity: 0.35; text-decoration: line-through; }
  .more-label { font-size: 9px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* phase colors for chips */
  .chip-p1 { background: var(--p1b); color: var(--p1); }
  .chip-p2 { background: var(--p2b); color: var(--p2); }
  .chip-p3 { background: var(--p3b); color: var(--p3); }
  .chip-p4 { background: var(--p4b); color: var(--p4); }
  .chip-p5 { background: var(--p5b); color: var(--p5); }

  /* ── modal ── */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    width: 100%;
    max-width: 460px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .modal-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .modal-close {
    float: right;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    margin-top: -2px;
  }
  .modal-close:hover { color: var(--text2); }
  .modal-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .modal-item:last-child { border-bottom: none; }
  .modal-cb {
    width: 17px; height: 17px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .modal-cb.checked { background: var(--p1); border-color: var(--p1); }
  .modal-cb svg { display: none; }
  .modal-cb.checked svg { display: block; }
  .modal-text { font-size: 13px; line-height: 1.5; color: var(--text); transition: color 0.15s; }
  .modal-text.done { color: var(--done-text); text-decoration: line-through; }
  .phase-tag {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-bottom: 4px;
  }

  /* ── list view ── */
  .phase-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .phase-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .phase-card-header:hover { background: var(--bg3); }
  .phase-card-left { display: flex; align-items: center; gap: 10px; }
  .phase-bar { width: 3px; height: 32px; border-radius: 2px; flex-shrink: 0; }
  .phase-name { font-size: 13px; font-weight: 500; }
  .phase-range { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .phase-right { display: flex; align-items: center; gap: 10px; }
  .phase-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
  .mini-bar { width: 60px; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .mini-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  .phase-body { display: none; border-top: 1px solid var(--border); }
  .phase-body.open { display: block; }
  .week-block { padding: 10px 18px 4px; border-bottom: 1px solid var(--border); }
  .week-block:last-child { border-bottom: none; }
  .week-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 6px; text-transform: uppercase; }
  .list-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 7px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: opacity 0.15s;
  }
  .list-item:last-child { border-bottom: none; }
  .list-cb {
    width: 15px; height: 15px;
    border-radius: 3px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .list-cb.checked { background: var(--p1); border-color: var(--p1); }
  .list-cb svg { display: none; }
  .list-cb.checked svg { display: block; }
  .list-text { font-size: 12px; color: var(--text); line-height: 1.5; transition: color 0.15s; }
  .list-text.done { color: var(--done-text); text-decoration: line-through; }

  /* ── legend ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 22px;
    font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* ── stats bar ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
  }
  .stat-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text); }
  .stat-val span { font-size: 13px; color: var(--text3); }

  @media (max-width: 640px) {
    .main { padding: 16px; }
    header { padding: 14px 16px; }
    .cal-grid { gap: 2px; }
    .day-cell { min-height: 72px; padding: 5px; }
    .task-chip { font-size: 9px; }
    .prog-bar { width: 80px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">Visual Design</div>
    <div class="title">필기 학습 캘린더</div>
    <div class="dday-pill" id="dday">D-?</div>
  </div>
  <div class="header-right">
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-text" id="prog-text">0%</div>
    </div>
    <button class="reset-btn" onclick="resetAll()">초기화</button>
  </div>
</header>

<div class="main">
  <!-- stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">전체 항목</div><div class="stat-val" id="s-total">0<span>개</span></div></div>
    <div class="stat-card"><div class="stat-label">완료</div><div class="stat-val" id="s-done">0<span>개</span></div></div>
    <div class="stat-card"><div class="stat-label">남은 항목</div><div class="stat-val" id="s-left">0<span>개</span></div></div>
    <div class="stat-card"><div class="stat-label">시험까지</div><div class="stat-val" id="s-days">0<span>일</span></div></div>
  </div>

  <!-- legend -->
  <div class="legend" id="legend"></div>

  <!-- view toggle -->
  <div class="view-toggle">
    <button class="view-btn active" id="btn-cal" onclick="switchView('cal')">캘린더 보기</button>
    <button class="view-btn" id="btn-list" onclick="switchView('list')">목록 보기</button>
  </div>

  <!-- calendar -->
  <div class="cal-section active" id="cal-section"></div>

  <!-- list -->
  <div class="list-section" id="list-section"></div>
</div>

<!-- modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="document.getElementById('modal-bg').classList.remove('open')">✕</button>
    <div class="modal-date" id="modal-date"></div>
    <div id="modal-body"></div>
  </div>
</div>

      {label:'시험 전날·당일 5/6-5/9', days:{
        '2026-05-06':['오답 노트 전체 최종 복습','핵심 키워드 암기 리스트 2회 반복'],
        '2026-05-07':['자주 출제 공식·개념 빠르게 훑기','모의고사 1회 가볍게 실전 연습'],
        '2026-05-08':['시험 준비물 확인 — 수험표·신분증·필기구','충분한 수면으로 컨디션 조절'],
        '2026-05-09':['시험 당일 핵심 키워드만 가볍게 확인','시각디자인 기사 필기 시험 응시!'],
      }},
    ]
  },
];

const MONTHS = [
  { year:2026, month:3, label:'March 2026' },
  { year:2026, month:4, label:'April 2026' },
  { year:2026, month:5, label:'May 2026' },
];
const DAY_LABELS = ['일','월','화','수','목','금','토'];

let state = {};

function toKey(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function loadState(){ try{ const s=localStorage.getItem(STORAGE_KEY); if(s) state=JSON.parse(s); }catch(e){} }
function saveState(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){} }

function getAllTasks(){
  const map = {};
  PHASES.forEach(ph => ph.weeks.forEach(wk => {
    Object.entries(wk.days).forEach(([date, tasks]) => {
      if(!map[date]) map[date]=[];
      tasks.forEach((t,i)=> map[date].push({key:`${date}_${ph.id}_${i}`,text:t,phase:ph}));
    });
  }));
  return map;
}
const ALL_TASKS = getAllTasks();

function totalCount(){ return Object.values(ALL_TASKS).reduce((a,b)=>a+b.length,0); }
function doneCount(){ return Object.values(state).filter(Boolean).length; }

function updateStats(){
  const total=totalCount(), done=doneCount(), left=total-done;
  const pct=Math.round(done/total*100);
  document.getElementById('s-total').innerHTML=total+'<span>개</span>';
  document.getElementById('s-done').innerHTML=done+'<span>개</span>';
  document.getElementById('s-left').innerHTML=left+'<span>개</span>';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=pct+'%';
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.ceil((EXAM_DATE-today)/(86400000));
  document.getElementById('s-days').innerHTML=(diff>=0?diff:0)+'<span>일</span>';
  const ddEl=document.getElementById('dday');
  if(diff>0) ddEl.textContent='D-'+diff;
  else if(diff===0) ddEl.textContent='D-DAY';
  else ddEl.textContent='시험 완료';
}

function renderLegend(){
  const el=document.getElementById('legend');
  el.innerHTML=PHASES.map(p=>`<div class="legend-item"><div class="legend-dot" style="background:${p.color}"></div>${p.label}</div>`).join('');
}

function renderCalendar(){
  const el=document.getElementById('cal-section');
  const today=new Date(); today.setHours(0,0,0,0);
  let html='';
  MONTHS.forEach(({year,month,label})=>{
    html+=`<div class="month-block"><div class="month-title">${label}</div><div class="cal-grid">`;
    DAY_LABELS.forEach(d=>{ html+=`<div class="day-header">${d}</div>`; });
    const firstDay=new Date(year,month-1,1).getDay();
    for(let i=0;i<firstDay;i++) html+=`<div class="day-cell empty"></div>`;
    const daysInMonth=new Date(year,month,0).getDate();
    for(let d=1;d<=daysInMonth;d++){
      const key=toKey(year,month,d);
      const tasks=ALL_TASKS[key]||[];
      const isToday=new Date(year,month-1,d).getTime()===today.getTime();
      const hasTasks=tasks.length>0;
      const show=tasks.slice(0,2);
      const more=tasks.length-2;
      const todayDot=isToday?'<div class="today-dot"></div>':'';
      let chips=show.map(t=>{
        const cls='chip-'+t.phase.id+(state[t.key]?' done-chip':'');
        return `<span class="task-chip ${cls}">${t.text}</span>`;
      }).join('');
      if(more>0) chips+=`<div class="more-label">+${more}개 더</div>`;
      html+=`<div class="day-cell${hasTasks?' has-tasks':''}${isToday?' today':''}" ${hasTasks?`onclick="openModal('${key}')"`:''}><div class="day-num"><span>${d}</span>${todayDot}</div>${chips}</div>`;
    }
    html+=`</div></div>`;
  });
  el.innerHTML=html;
}

function renderList(){
  const el=document.getElementById('list-section');
  el.innerHTML=PHASES.map(ph=>{
    let total=0,done=0;
    ph.weeks.forEach(wk=>Object.values(wk.days).forEach(tasks=>tasks.forEach((_,i)=>{
      const key=Object.keys(wk.days).find(date=>wk.days[date].indexOf(wk.days[Object.keys(wk.days)[0]][0])>=0);
      total++;
    })));
    const allKeys=[];
    ph.weeks.forEach(wk=>Object.entries(wk.days).forEach(([date,tasks])=>tasks.forEach((_,i)=>allKeys.push(`${date}_${ph.id}_${i}`))));
    total=allKeys.length;
    done=allKeys.filter(k=>state[k]).length;
    const pct=total?Math.round(done/total*100):0;
    let weeksHtml=ph.weeks.map(wk=>{
      let itemsHtml=Object.entries(wk.days).map(([date,tasks])=>
        tasks.map((t,i)=>{
          const k=`${date}_${ph.id}_${i}`;
          const chk=state[k]?'checked':'';
          const doneClass=state[k]?'done':'';
          return `<div class="list-item" onclick="toggleKey('${k}')">
            <div class="list-cb ${chk}"><svg width="9" height="7" viewBox="0 0 9 7"><path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="2" fill="none"/></svg></div>
            <span class="list-text ${doneClass}">${t}</span>
          </div>`;
        }).join('')
      ).join('');
      return `<div class="week-block"><div class="week-label">${wk.label}</div>${itemsHtml}</div>`;
    }).join('');
    return `<div class="phase-card">
      <div class="phase-card-header" onclick="togglePhase('${ph.id}')">
        <div class="phase-card-left">
          <div class="phase-bar" style="background:${ph.color}"></div>
          <div><div class="phase-name">${ph.label}</div></div>
        </div>
        <div class="phase-right">
          <div class="phase-pct">${done}/${total}</div>
          <div class="mini-bar"><div class="mini-fill" style="background:${ph.color};width:${pct}%"></div></div>
          <div class="chevron" id="chev-${ph.id}">▼</div>
        </div>
      </div>
      <div class="phase-body" id="pbody-${ph.id}">${weeksHtml}</div>
    </div>`;
  }).join('');
}

function togglePhase(id){
  const body=document.getElementById('pbody-'+id);
  const chev=document.getElementById('chev-'+id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

let currentModalDate=null;
function openModal(dateKey){
  const tasks=ALL_TASKS[dateKey]||[]; if(!tasks.length) return;
  const [y,m,d]=dateKey.split('-');
  document.getElementById('modal-date').textContent=`${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
  const body=document.getElementById('modal-body');
  body.innerHTML=tasks.map(t=>{
    const chk=state[t.key]?'checked':'';
    const done=state[t.key]?'done':'';
    return `<div class="modal-item" onclick="toggleKey('${t.key}')">
      <div class="modal-cb ${chk}"><svg width="9" height="7" viewBox="0 0 9 7"><path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="2" fill="none"/></svg></div>
      <span class="modal-text ${done}">${t.text}</span>
    </div>`;
  }).join('');
  currentModalDate=dateKey;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e){
  if(e.target===document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('open');
}

function toggleKey(key){
  state[key]=!state[key];
  saveState();
  refreshAll();
  if(currentModalDate) openModal(currentModalDate);
}

function resetAll(){
  if(!confirm('모든 체크를 초기화할까요?')) return;
  state={};
  saveState();
  refreshAll();
  document.getElementById('modal-bg').classList.remove('open');
}

function refreshAll(){
  renderCalendar();
  renderList();
  updateStats();
}

function switchView(v){
  document.getElementById('cal-section').classList.toggle('active', v==='cal');
  document.getElementById('list-section').classList.toggle('active', v==='list');
  document.getElementById('btn-cal').classList.toggle('active', v==='cal');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
}

loadState();
renderLegend();
refreshAll();
</script>
</body>
</html>
