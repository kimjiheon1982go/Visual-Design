<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시각디자인 산업기사 학습 플래너 · 2026.05.09</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --border: #2a2a2e;
    --text: #e8e6e0;
    --muted: #7a7875;
    --accent-theory1: #c8a96e;  /* Subject 1 - 황금 */
    --accent-theory2: #8fb8d0;  /* Subject 2 - 블루그레이 */
    --accent-theory3: #a8c49a;  /* Subject 3 - 그린 */
    --accent-mock: #d4846a;     /* 모의고사 - 테라코타 */
    --accent-past: #b07cc6;     /* 기출문제 - 바이올렛 */
    --accent-final: #e06565;    /* 시험당일 - 레드 */
    --accent-rest: #555560;     /* 복습/정리 */
    --done-bg: #1d1f1a;
    --done-check: #6a9960;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,14,15,.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px,4vw,64px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .header-left {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.35rem;
    letter-spacing: .12em;
    color: var(--accent-theory1);
  }
  .subtitle {
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .08em;
    font-family: 'DM Mono', monospace;
  }
  .dday-badge {
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
    color: var(--bg);
    background: var(--accent-final);
    padding: 4px 12px;
    border-radius: 2px;
    letter-spacing: .06em;
  }

  /* ── HERO ── */
  .hero {
    padding: clamp(32px,6vw,80px) clamp(16px,4vw,64px) 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 24px;
  }
  .hero-title {
    font-size: clamp(1.8rem, 5vw, 3.6rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -.01em;
  }
  .hero-title .highlight {
    color: var(--accent-theory1);
    position: relative;
  }
  .progress-block {
    text-align: right;
    flex-shrink: 0;
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .1em;
    margin-bottom: 6px;
  }
  .progress-bar-wrap {
    width: 220px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-theory1), var(--accent-mock));
    border-radius: 3px;
    transition: width .4s ease;
  }
  .progress-numbers {
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    color: var(--text);
    margin-top: 4px;
  }
  .progress-numbers span { color: var(--accent-theory1); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
    padding: 24px clamp(16px,4vw,64px) 16px;
    border-bottom: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── PHASE SECTION ── */
  .phases {
    padding: 0 clamp(16px,4vw,64px);
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 48px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .phase-line {
    height: 1px;
    flex: 1;
    background: var(--border);
  }
  .phase-label {
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    letter-spacing: .15em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .phase-title {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: .02em;
  }

  /* ── DAYS GRID ── */
  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }

  /* ── DAY CARD ── */
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease, background .15s ease;
    position: relative;
    overflow: hidden;
  }
  .day-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 6px 0 0 6px;
    background: var(--card-color, var(--border));
  }
  .day-card:hover {
    transform: translateY(-2px);
    border-color: var(--card-color, var(--border));
  }
  .day-card.done {
    background: var(--done-bg);
    opacity: .65;
  }
  .day-card.done .card-title { text-decoration: line-through; text-decoration-color: var(--muted); }
  .day-card.today {
    border-color: var(--card-color, var(--accent-theory1));
    background: rgba(200,169,110,.04);
  }
  .day-card.today::after {
    content: 'TODAY';
    position: absolute;
    top: 10px; right: 12px;
    font-family: 'DM Mono', monospace;
    font-size: .55rem;
    letter-spacing: .12em;
    color: var(--card-color, var(--accent-theory1));
    background: rgba(200,169,110,.12);
    padding: 2px 6px;
    border-radius: 2px;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card-dday {
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    color: var(--card-color, var(--muted));
    letter-spacing: .06em;
    opacity: .85;
  }
  .card-date {
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    color: var(--muted);
  }
  .card-check {
    margin-left: auto;
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .day-card.done .card-check {
    background: var(--done-check);
    border-color: var(--done-check);
  }
  .card-check svg { display: none; }
  .day-card.done .card-check svg { display: block; }

  .card-title {
    font-size: .82rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
    padding-right: 24px;
  }
  .card-items {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .card-items li {
    font-size: .7rem;
    color: var(--muted);
    line-height: 1.4;
    padding-left: 10px;
    position: relative;
  }
  .card-items li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--card-color, var(--muted));
    opacity: .7;
  }

  /* ── EXAM DAY ── */
  .exam-day {
    background: linear-gradient(135deg, #1a0808, #200d0d);
    border: 1px solid var(--accent-final);
    border-radius: 8px;
    padding: 28px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .exam-day::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(224,101,101,.08), transparent 60%);
  }
  .exam-day-label {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    letter-spacing: .2em;
    color: var(--accent-final);
    margin-bottom: 10px;
  }
  .exam-day-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
  }
  .exam-day-sub {
    margin-top: 8px;
    font-size: .75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 0 clamp(16px,4vw,64px);
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .stat-chip {
    font-family: 'DM Mono', monospace;
    font-size: .68rem;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-chip .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  /* ── FOOTER ── */
  footer {
    margin-top: 60px;
    padding: 20px clamp(16px,4vw,64px);
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  @media (max-width: 520px) {
    .days-grid { grid-template-columns: 1fr; }
    .progress-bar-wrap { width: 160px; }
  }
</style>
</head>

    days: [
      { date: '2026-05-06', label: '정리', title: '핵심 이론 최종 요약본 정리', items: ['각 과목별 핵심 키워드 1장 요약', '자주 틀리는 유형 최종 점검'] },
      { date: '2026-05-07', label: '정리', title: '모의고사 1~2회 재도전 + 컨디션 조절', items: ['실전처럼 시간 재고 풀기', '식사·수면 루틴 정상화'] },
      { date: '2026-05-08', label: '정리', title: 'D-1 · 가볍게 훑고 쉬기', items: ['요약본 한 번 훑기', '시험장 위치·준비물 확인', '충분한 수면 ★'] },
    ]
  },
];

// ── 시험일 ──
const EXAM_DATE = new Date('2026-05-09');

// ── 오늘 ──
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

// ── D-day 계산 ──
function calcDday(dateStr) {
  const t = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((EXAM_DATE - t) / 86400000);
  if (diff > 0) return `D-${diff}`;
  if (diff === 0) return 'D-DAY';
  return `D+${Math.abs(diff)}`;
}

// ── localStorage key ──
const STORAGE_KEY = 'vd_planner_2026';

function loadDone() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveDone(obj) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
}

// ── 렌더 ──
function render() {
  const done = loadDone();
  const today = todayStr();
  const phasesEl = document.getElementById('phases');
  phasesEl.innerHTML = '';

  // D-day badge
  const nowDiff = Math.round((EXAM_DATE - new Date()) / 86400000);
  document.getElementById('ddayBadge').textContent = nowDiff > 0 ? `D-${nowDiff}` : nowDiff === 0 ? 'D-DAY' : '시험 종료';

  let totalCards = 0, doneCount = 0;

  PLAN.forEach(phase => {
    const section = document.createElement('section');

    // phase header
    const phHeader = document.createElement('div');
    phHeader.className = 'phase-header';
    phHeader.innerHTML = `
      <div class="phase-line"></div>
      <span class="phase-label">${phase.phase}</span>
      <div class="phase-line"></div>
    `;
    section.appendChild(phHeader);

    const phTitle = document.createElement('h2');
    phTitle.className = 'phase-title';
    phTitle.style.color = phase.color;
    phTitle.style.marginBottom = '16px';
    phTitle.textContent = phase.title;
    section.appendChild(phTitle);

    const grid = document.createElement('div');
    grid.className = 'days-grid';

    phase.days.forEach(day => {
      totalCards++;
      const isDone = !!done[day.date];
      if (isDone) doneCount++;
      const isToday = day.date === today;

      const card = document.createElement('div');
      card.className = 'day-card' + (isDone ? ' done' : '') + (isToday ? ' today' : '');
      card.style.setProperty('--card-color', phase.color);

      const dday = calcDday(day.date);
      const dateDisp = day.date.slice(5).replace('-', '/');

      card.innerHTML = `
        <div class="card-meta">
          <span class="card-dday">${dday}</span>
          <span class="card-date">${dateDisp}</span>
          <div class="card-check">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="card-title">${day.title}</div>
        <ul class="card-items">${day.items.map(i => `<li>${i}</li>`).join('')}</ul>
      `;

      card.addEventListener('click', () => {
        const d = loadDone();
        d[day.date] ? delete d[day.date] : (d[day.date] = true);
        saveDone(d);
        render();
      });

      grid.appendChild(card);
    });

    section.appendChild(grid);
    phasesEl.appendChild(section);
  });

  // 시험 당일 카드
  const examSection = document.createElement('section');
  const phHeader2 = document.createElement('div');
  phHeader2.className = 'phase-header';
  phHeader2.innerHTML = `<div class="phase-line"></div><span class="phase-label">EXAM DAY</span><div class="phase-line"></div>`;
  examSection.appendChild(phHeader2);
  const examCard = document.createElement('div');
  examCard.className = 'exam-day';
  examCard.innerHTML = `
    <div class="exam-day-label">2026.05.09 · SATURDAY</div>
    <div class="exam-day-title">🎯 시각디자인 산업기사 필기 시험</div>
    <div class="exam-day-sub">지금까지 쌓은 실력을 믿고 — 침착하게, 끝까지.</div>
  `;
  examSection.appendChild(examCard);
  phasesEl.appendChild(examSection);

  // 진행률 업데이트
  document.getElementById('doneCount').textContent = doneCount;
  document.getElementById('totalCount').textContent = totalCards;
  const pct = totalCards ? Math.round(doneCount / totalCards * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  // 통계 칩
  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = `
    <div class="stat-chip"><span class="dot" style="background:var(--accent-theory1)"></span>이론 21일</div>
    <div class="stat-chip"><span class="dot" style="background:var(--accent-mock)"></span>모의고사 8일</div>
    <div class="stat-chip"><span class="dot" style="background:var(--accent-past)"></span>기출 6일</div>
    <div class="stat-chip"><span class="dot" style="background:var(--accent-rest)"></span>정리·복습 3일</div>
    <div class="stat-chip" style="margin-left:auto">진행률 ${pct}%</div>
  `;
}

render();
</script>
</body>
</html>
