<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제1과목 시각디자인 조사·분석 연습문제</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222636;
  --border: #2d3148;
  --accent: #7c9ef5;
  --accent2: #5b7de8;
  --text: #e2e6f0;
  --text-muted: #8891aa;
  --text-dim: #5a6480;
  --nav-bg: #13161f;
  --correct: #2d5a2d;
  --correct-border: #4a9a4a;
  --correct-text: #7ed87e;
  --wrong: #5a2020;
  --wrong-border: #9a4a4a;
  --wrong-text: #e88888;
  --selected: #2a3a6a;
  --selected-border: #5b7de8;
}
body.light {
  --bg: #f0f2f8;
  --surface: #ffffff;
  --surface2: #e8ecf8;
  --border: #cdd3e8;
  --accent: #3a60d8;
  --accent2: #2a4fc0;
  --text: #1a1f30;
  --text-muted: #5a6480;
  --text-dim: #9aa0b8;
  --nav-bg: #e8ecf8;
  --correct: #e8f5e8;
  --correct-border: #4a9a4a;
  --correct-text: #2a6a2a;
  --wrong: #f5e8e8;
  --wrong-border: #9a4a4a;
  --wrong-text: #8a2020;
  --selected: #dce6ff;
  --selected-border: #3a60d8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  line-height: 1.7;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--nav-bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.subject-badge {
  background: var(--accent2);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: 0.04em;
}
.header-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.score-display {
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
  white-space: nowrap;
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.btn-sm {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

/* ── PROGRESS ── */
.progress-bar { height: 3px; background: var(--border); }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.4s; }

/* ── FILTERS ── */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.filter-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}

/* ── MAIN ── */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 16px 48px;
}

/* ── QUESTION CARD ── */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
.q-card:hover { border-color: var(--text-dim); }
.q-card.answered { border-color: var(--border); }

.q-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}
.q-num {
  background: var(--surface2);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  letter-spacing: 0.05em;
}
.q-text {
  font-size: 14.5px;
  color: var(--text);
  font-weight: 500;
  flex: 1;
  line-height: 1.65;
}
.q-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  margin: 0 0 12px 36px;
  font-size: 13.5px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ── OPTIONS ── */
.options { margin-left: 36px; display: flex; flex-direction: column; gap: 6px; }
.opt {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 14px;
  border: 1px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg);
}
.opt:hover:not(.disabled) {
  border-color: var(--accent);
  background: var(--surface2);
}
.opt.selected {
  background: var(--selected);
  border-color: var(--selected-border);
}
.opt.correct {
  background: var(--correct);
  border-color: var(--correct-border);
}
.opt.wrong {
  background: var(--wrong);
  border-color: var(--wrong-border);
}
.opt.disabled { cursor: default; }
.opt-num {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all 0.15s;
}
.opt.selected .opt-num { background: var(--accent2); border-color: var(--accent2); color: #fff; }
.opt.correct .opt-num { background: var(--correct-border); border-color: var(--correct-border); color: #fff; }
.opt.wrong .opt-num { background: var(--wrong-border); border-color: var(--wrong-border); color: #fff; }
.opt-text {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.6;
  flex: 1;
}
.opt.correct .opt-text { color: var(--correct-text); font-weight: 500; }
.opt.wrong .opt-text { color: var(--wrong-text); }

/* ── RESULT BADGE ── */
.result-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: 10px 0 0 36px;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
}
.result-badge.correct-badge { background: var(--correct); color: var(--correct-text); border: 1px solid var(--correct-border); }
.result-badge.wrong-badge { background: var(--wrong); color: var(--wrong-text); border: 1px solid var(--wrong-border); }

/* ── SUMMARY ── */
.summary-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.summary-stat {
  text-align: center;
  min-width: 70px;
}
.summary-stat .val {
  font-size: 26px;
  font-weight: 700;
  line-height: 1.1;
}
.summary-stat .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.stat-total .val { color: var(--text); }
.stat-correct .val { color: var(--correct-text); }
.stat-wrong .val { color: var(--wrong-text); }
.stat-remain .val { color: var(--accent); }
.summary-bar .reset-btn {
  margin-left: auto;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.summary-bar .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── HIDDEN ── */
.hidden { display: none !important; }

@media (max-width: 520px) {
  .q-text { font-size: 13.5px; }
  .options { margin-left: 0; }
  .q-box { margin-left: 0; }
  .result-badge { margin-left: 0; }
  .opt-text { font-size: 13px; }
  .header-title { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="subject-badge">제1과목</span>
    <span class="header-title">시각디자인 조사·분석 연습문제</span>
  </div>
  <div class="header-right">

  <div id="quizList"></div>
</div>

<script>
const ANSWERS = {

  141:2, 142:1, 143:2, 144:4, 145:4, 146:2, 147:4, 148:3, 149:2, 150:1,
  151:4, 152:3, 153:1, 154:2, 155:4, 156:1, 157:2, 158:2, 159:3, 160:1,

const QUESTIONS = [
  {n:1, t:"디자인의 개념에 관한 설명 중 거리가 먼 것은?", opts:["'설계하다', '계획하다'라는 의미를 갖는다.","사물의 재료, 기능, 구조에 조형성을 부여하는 종합적인 계획이다.","인간이 보고 즐길 수 있는 매우 아름다운 예술영역을 의미한다.","더욱 쾌적한 생활환경 형성에 기여하는 행위이다."]},
  {n:2, t:"디자인에 대한 설명으로 옳은 것은?", opts:["주관적인 사고의 표현","주로 감상을 목적으로 제작","소비자라는 평가자가 존재","우연적 효과와 표현"]},
  {n:3, t:"다음 중 시각디자인에 관한 내용으로 틀린 것은?", opts:["시각디자인의 역할은 의미전달보다는 감성적 만족을 주는 것이 가장 중요하다.","시각 커뮤니케이션에 있어 색채는 매우 중요한 역할을 하는 디자인 요소이다.","시각디자인은 일차적으로 시각적 흥미를 불러일으킬 필요가 있다.","시각디자인의 매체는 인쇄매체에서 점차 영상매체로 확대되고 있다."]},
  {n:4, t:"다음 중 시각디자인 분야에 속하는 것은?", opts:["자동차와 가전제품의 기능이해와 모델링","주택의 인테리어 설계 및 가구의 구성과 배치","전시장의 작품 디스플레이와 조명연출","책과 잡지의 출판을 위한 편집과 인쇄 제작"]},
  {n:5, t:"다음 디자인의 영역 중 주로 시각적인 전달수단을 이용하여 사람과 사람의 관계를 연결해 주는 것은?", opts:["산업디자인","프로덕트 디자인","커뮤니케이션 디자인","환경디자인"]},
  {n:6, t:"디자인의 역할 중에서 커뮤니케이션이 중심이 되고 심벌과 기호를 통해 정보를 전달하는 분야는?", opts:["제품디자인","시각디자인","평면디자인","환경디자인"]},
  {n:7, t:"현대 매스 커뮤니케이션 이론은 다음 중 어느 나라를 중심으로 발전하였는가?", opts:["미국","독일","영국","프랑스"]},
  {n:8, t:"시각디자인에서 그래픽의 어원과 관련이 없는 것은?", opts:["쓰다.","생각하다.","그라피코스(graphikos)","도식화한다."]},
  {n:9, t:"디자인의 영역을 일반적으로 크게 3가지 분야로 구분할 때 적절하지 않은 것은?", opts:["제품디자인","인테리어 디자인","시각디자인","환경디자인"]},
  {n:10, t:"디자인 조건의 변화에 해당되지 않는 것은?", opts:["차별화된 세계적 브랜드화","사용자의 편의에 중점을 둔 디자인","환경을 고려한 디자인","과거의 고정된 집단의 취향 중시"]},
  {n:11, t:"다음 중 디자인 조건과 비교적 거리가 먼 것은?", opts:["합목적성","경제성","독창성","장식성"]},
  {n:12, t:"다음 중 디자인의 과정에 해당되지 않는 것은?", opts:["욕구과정","조형과정","재료과정","판매과정"]},
  {n:13, t:"세계 시장과의 자유경쟁시대를 맞이한 국내 디자인계의 대응책으로 적합하지 않은 것은?", opts:["세계의 각 지역문화들을 이해하고 사용실태의 철저한 조사, 분석을 토대로 제품개발에 임해야 한다.","세계화된 공통언어의 디자인을 개발해야 한다.","한국형 상품의 지속적인 개발만이 유일한 대응 방법이다.","마케팅의 다원론적인 접근 방법과 기술연구개발에 공동 대처해야 한다."]},
  {n:14, t:"일반적인 디자인의 아이디어 도출 과정을 순서대로 나열한 것은?", opts:["아이디에이션→정보수집→콘셉트 도출→정보분석","아이디에이션→정보수집→콘셉트 도출→아이디에이션","정보수집→콘셉트 도출→아이디에이션→정보분석","정보수집→정보분석→아이디에이션→콘셉트 도출"]},
  {n:15, t:"훌륭한 디자이너의 역할과 자세가 아닌 것은?", opts:["소비자 의식조사, 시장조사 등 객관적 데이터를 디자인 콘셉트 결정에 활용해야 한다.","생산자가 소비자에게 알리고자 하는 정보를 단순 명료하게 전달해야 한다.","디자인은 창작활동, 즉 예술활동이므로 자신의 직관과 주관에 의존하여 작업해야 한다.","경제원칙에 입각하여 최소의 경비로 최대의 효과를 창출해야 한다."]},
  {n:16, t:"디자인 분야를 평면, 준입체, 영상디자인으로 나눌 때, 준입체 디자인 분야에 해당되는 것은?", opts:["다이어그램 디자인","캘린더 디자인","홀로그램","슈퍼그래픽 디자인"]},
  {n:17, t:"디자인의 조건 중 경제성에 관한 설명으로 틀린 것은?", opts:["최소한의 시간과 노력으로 최대한의 효과를 얻는 것","최대한의 비용으로 최상의 디자인을 하는것","최소한의 비용으로 최대의 효과를 얻는 것","최소한의 재료와 노동력으로 최대 기능을 발휘하는 것"]},
  {n:18, t:"다음 중 메시지(message)를 가장 중요시하는 디자인 분야는?", opts:["제품디자인","시각디자인","환경디자인","의상디자인"]},
  {n:19, t:"산업디자인의 개념에 가장 적합한 것은?", opts:["개인의 창작활동","개인의 취미에 따른 활동","아름다움에 대한 표현완동","불질문화 속에서 생활문제를 해결하는 창조활동"]},
  {n:20, t:"감성 공학에 대한 설명으로 틀린 것은?", opts:["감성 공학이라는 단어가 처음으로 사용된 것은 일본 마쓰다(Mazda) 자동차 회사다.","기능적 측면 이외의 감성적인 측면까지도 디자인하는 것을 말한다.","루이스 설리반(Louis H. Sullivan)은 \"형태는 감성을 따른다.\"라고 했다.","인간이 제품에 대해 가지고 있는 욕구로서 이미지나 느낌을 물리적인 디자인 요소로 해석하여 이를 제품의 디자인에 반영하는 기술이라고 정의하였다."]},
  {n:21, t:"디자인을 크게 세 영역으로 분류할 때, 이에 해당하지 않는 것은?", opts:["제품디자인","환경디자인","시각디자인","광고디자인"]},
  {n:22, t:"디자인의 분류 중 2차원 디자인이 아닌 것은?", opts:["사진, 심벌디자인","타이포그래피, 벽지디자인","쾌기디자인, 액세서리디자인","레터링디자인, 폰트디자인"]},
  {n:23, t:"산업디자인에 관한 설명을 가장 적절하게 표현한 것은?", opts:["실용적일 수 있도록 기능적인 면만을 최대한 고려하는 과학적이고 논리적인 행위이다.","만들려는 목적물을 계획하고 구체적으로 그 이미지를 실현하려는 행위이다.","아름다움만을 추구하는 형태로 조형활동이다.","기존의 방법을 수정 개선하여 모방하는 활동이다."]},
  {n:24, t:"시각커뮤니케이션 매체의 특징 중에서 설명이 틀린 것은?", opts:["편집 디자인은 신문, 잡지, 브로슈어, 서적 등에서 시각물을 기능적으로 구성하고, 그 구성 속에 정보의 위계를 탄생시키는 분야이다.","캘린더는 정보의 제공과 장식적인 기능도 병행한다.","포스터는 광고매체로서 이용되며 감각적이고 인상적인 방법이나 장식성은 없다.","포장디자인은 상품을 보호하고 상품의 미적 가치를 높여 판매촉진을 돕는다."]},
  {n:25, t:"( ) 안에 옳은 내용은?\n커뮤니케이션이란 사람이 ( )를(을) 통해 정보나 메시지를 전달하고 수신해 서로 공통된 의미를 만들고 서로의 행동에 영향을 미치는 과정이다.", opts:["기호(sign)","심벌(symbol)","마인드(mind)","물상(物象)"]},
  {n:26, t:"커뮤니케이션에 있어 설득적 기능의 매체는?", opts:["신호, 화살표, 문자","포스터, 신문광고, 다이렉트 메일","심벌마크, 패턴, 일러스트레이션","사진, 회화, 영화"]},
  {n:27, t:"디자이너의 사회적 역할 중 맞지 않는 것은?", opts:["소비자 욕구충족","의식수준 향상","예술과 기술의 조화","예술적 특권 완보"]},
  {n:28, t:"디자인 매니지먼트의 실천과정에서 인적요소와 물적요소를 형성하고, 이를 유기적으로 결합하여 사람을 적재적소에 배치하는 관리활동이 이루어지는 단계는?", opts:["계획화 단계","조직화 단계","동기화 단계","통제화 단계"]},
  {n:29, t:"디자인 관리의 3가지 과정으로 옳은 것은?", opts:["판매, 광고, 디스플레이","기획, 설명서, 라벨","포장, 광고, 전시","계획, 심시, 통제"]},
  {n:30, t:"시각디자인 과정의 순서가 맞는 것은?", opts:["기획→시장조사→전략 수립→비주얼 아이디에이션→시안디자인→프레젠테이션→최종디자인→제작 및 사후관리","기획→시안디자인→프레젠테이션→비주얼 아이디에이션→제작 및 사후관리→시장조사→최종디자인","시장조사→기획→비주얼 아이디에이션→전략 수립→시안디자인→프레젠테이션→최종디자인→제작 및 사후관리","전략 수립→시장조사→기획→시안디자인→비주얼 아이디에이션→프레젠테이션→최종디자인→제작 및 사후관리"]},
  {n:31, t:"디자인 관리 측면의 프로세스로 가장 바람직한 것은?", opts:["계획→시장조사→아이디어 수집→아이디어 확정→시안 제작→프레젠테이션→생산, 품질관리→종합평가","아이디어 수집→시장조사→계획→분석→생산, 품질관리→프레젠테이션→종합평가","분석→시장조사→아이디어 확정→품질관리→제작→프레젠테이션→시안 제작→사후관리","시장조사→분석→아이디어 수집→아이디어 확정→생산, 품질관리→프레젠테이션→시안 제작→사후관리"]},
  {n:32, t:"'디자인 관리'의 의의와 관련이 없는 것은?", opts:["계획","조직","조성 및 통제","세무 및 감사"]},
  {n:33, t:"구매동기, 경쟁상품의 품질비교, 디자인에 대한 문제점, 디자인 개선에 대한 요구사항이 조사되는 디자인 관리의 요소는?", opts:["새로운 재료, 부품의 조사","소비자 여론조사","상품의 유통과성에 대한 조사","출판물에 대한 조사"]},
  {n:34, t:"모든 디자인 개념을 미국의 자본주의 시장과 결합하여 비즈니스로 확장시킨 사람은?", opts:["루이스 설리반","윌리엄 모리스","레이먼드 로위","발터 그로피우스"]},
  {n:35, t:"다음 중 Kano model에 대한 설명으로 옳지 않은 것은?", opts:["Kano model은 제품, 서비스의 기능 요소를 분석하여 사용자 만족도를 파악하는 방법론이다.","Kano model에서는 5가지 기능 요소를 분류한다.","Kano model에서는 선호 요소가 반드시 충족되어야 하는 요소이다.","Kano model을 활용하면 사용자의 요구에 적합한 기능을 제공하여 기대 이상의 만족도를 느끼게 할 수 있다."]},
  {n:36, t:"다음 중 '디자인 경영'의 개념에 해당되지 않는 것은?", opts:["경영 목표의 달성에 기여함이란 대중의 생활복리를 증진시켜 주는 것이 궁극적인 목적이 될 수 있다.","디자인 경영이란 서비스의 질적 수준과 생산성을 제고할 수 있도록 해주는 지식체계라고도 할 수 있다.","디자인 경영은 '디자인 관리'라고도 부르며, 1990년대에 들어서면서부터 세계적으로 가장 빈번하게 사용되는 디자인 용어 중의 하나이다.","'디자인 경영'은 본질적으로 '비지니스 경영'과 동일한 개념이다."]},
  {n:37, t:"목표 고객의 마음속에 기업이 원하는 제품 개념을 구축하려는 노력을 말하는 것으로 정해진 표적시장에 일맞은 마케팅전략을 수립하고 수행하는 것은?", opts:["계획화","머천다이징","포지서닝","브랜드 로열티"]},
  {n:38, t:"포지셔닝(positioning) 전략을 적용할 때 선행되어야 하는 것은?", opts:["시장 세분화","효과측정","매체조사","비용절감"]},
  {n:39, t:"제품 포지셔닝(positioning)에 대한 설명 중 틀린 것은?", opts:["소비자들은 특정 제품의 포지셔닝을 이해하면 구매를 망설이게 된다.","경쟁적인 우위를 확보할 수 있는 적절한 이점을 선정한다.","자사의 포지셔닝 콘셉트를 효과적으로 실행하여야 한다.","모든 잠재적인 경쟁적 이점을 확인한다."]},
  {n:40, t:"포지셔닝 전략의 수립과정에 포함되지 않은 것은?", opts:["경쟁적 강점 파악","적절한 경쟁우위의 선택","선택한 포지션의 전달","시장 세분화"]},
  {n:41, t:"아래 내용을 구성하는 3요소가 아닌 것은?\n디자인 전략은 한 기업의 디자인 활동이 지향해야 할 목표를 설정해 주는 종합적이며 장기적인 디자인 기획이다.", opts:["디자인 목표(design objectives)","디자인 범주(design scope)","디자인 운영정책(design operating policy)","디자인 트렌드(design trend)"]},
  {n:42, t:"지각도(perceptual map)는 다음 중 어떤 것을 보여주는 도구인가?", opts:["제품이나 브랜드의 포지셔닝","제품이나 브랜드의 가격","제품이나 브랜드의 판매망","제품이나 브랜드의 광고비용"]},
  {n:43, t:"표본의 크기에 대한 설명 중 틀린 것은?", opts:["표본의 오차는 표본을 뽑게 되는 모집단의 크기에 따라 크게 달라진다.","표본의 사례수(크기)는 오차와 관련되어 있다.","적정 표본 크기는 허용오차 범위에 의해 달라진다.","전문성이 부족한 연구자들은 선행연구의 표본 크기를 고려하여 사례수를 결정한다."]},
  {n:44, t:"자료수집방법으로 가장 용이한 표본조사법의 표본추출방법으로 틀린 것은?", opts:["표본은 특정조건에 맞추어 추출한다.","표본의 선정은 올바르고 정확하며 편차가 없는 방식으로 한다.","표본선정은 연구자가 대규모의 모집단에서 소규모의 표본을 뽑아야 한다.","표본은 모집단을 모두 포괄할 목록을 반드시 가지고 있어야 한다."]},
  {n:45, t:"표본조사의 방법 중 조사대상 전체를 조사하는 대신 일부분을 조사함으로써 전체를 추측하는 조사방법은?", opts:["다단추출법","계통추출법","무작위추출법","동간격추출법"]},
  {n:46, t:"소비자, 관심, 태도, 요구들을 파악하기 위한 조사방법 중 한 쌍의 대조적인 형용사를 선분의 양 끝에 설정하고, 몇 개의 점으로 나눠 이들 관련된 개념을 의미공간에 관련시켜 보는 조사기법은?", opts:["동행관찰(shadowing)","의미론적 차별법(semantic differential)","사이코 그래픽스(psychographics)","다차원적 척도법(multi-dimensional scaling)"]},
  {n:47, t:"백화점 출구에서 20대를 대상으로 하는 새로운 화장품 개발을 위한 조사를 하려고 할 때 가장 적합한 표본집단 선정법은?", opts:["무작위추출법","다단추출법","국화추출법","계통추출법"]},
  {n:48, t:"시장조사를 위한 1차 자료의 수집방법 중 실제적인 인과 관계를 측정하기 위하여 설계되며, 가능한 범위 내에서 일부 환경을 통제하고 그 결과를 관찰하는 방법은?", opts:["측정법","실험법","질문조사법","설문조사법"]},
  {n:49, t:"차료수집 설문지 조사를 위한 조사자 사전교육에 관한 내용과 가장 거리가 먼 것은?", opts:["조사의 취지와 표본 선정 방법에 대한 이해","조사자료 분석 연구에 대한 이해","면접과정의 지침","참가자의 응답에 영향을 주지 않도록 중립적이고 객관적인 태도 유지"]},
  {n:50, t:"조사를 위한 표본추출방법으로 틀린 것은 어느 것인가?", opts:["대규모 집단에서 소규모 집단을 뽑는다.","무작위로 표본추출한다.","편차가 가능한 많이 나는 방식으로 한다.","모집단에 대한 정확한 이해가 선행되어야 한다."]},
  {n:51, t:"마케팅 조사 시 자료수집방법 중 전문지식을 보유한 조사자가 소수의 응답자 집단을 대상으로 특정한 주제를 가지고 토론을 벌여 필요한 정보를 획득하는 탐색조사 방법 중 하나인 것은?", opts:["관찰법","설문조사","표적 집단 면접법","실험"]},
  {n:52, t:"군집(cluster)표본 추출과정에 대한 설명이 아닌 것은?", opts:["모집단을 모두 포괄하는 목록을 가지고 체계적으로 선정해야 한다.","모집단을 하위집단으로 구획하여 하위집단을 뽑는다.","점접적 소비계층을 찾기 위해서는 전국의 소비자 모두가 모집단이 된다.","편의가 없는 조사가 되기 위해서는 표본을 무작위로 뽑아야 한다."]},
  {n:53, t:"조사를 위한 표본추출방법에서 군집(집락, cluster)표본추출을 설명한 것으로 옳은 것은?", opts:["표본을 선정하기 전에 여러 하위집단으로 분류하고 각 하위집단별로 비례적으로 표본을 선정한다.","모집단의 개체를 구획하는 구조를 활용하여 표본추출 대상개체의 집합으로 이용하면 표본추층의 대상명부가 단순해지며 표본추출도 단순해진다.","조사결과에 크게 영향을 미치는 변수를 기준으로 하위모집단을 구분하는 것이 좋다.","지역적인 특성에 따른 소비자의 자동차 색상, 제선호 특성 등을 조사할 때 유리하다."]},
  {n:54, t:"사회학에서 유래한 인류학적 관찰 방법론 중 하나로, 사용자와 밀착해서 진행하는 관찰 방법론과 직접적인 인터뷰를 조화시킨 리서치 방법은?", opts:["플렉서블 리서치","에스노그래피 인터뷰","에스닉 디자인 리서치","유니버설 디자인"]},
  {n:55, t:"다음 중 새도잉 리서치에 대한 설명으로 틀린 것은?", opts:["대상자의 일상생활의 행동을 기록하여 필요 요소와 개선 요소 등을 세밀한 부분까지 관찰하는 방법이다.","리서치 대상자의 행동을 관찰하고 분석하는 대면적인 조사방법이지만 일상생활에 거슬리지 않도록 배려해야 한다.","전 과정을 직접 경험하고 결과를 분석하는 것이 매우 중요하다.","특이한 행동에 대한 인터뷰를 병행하는 것이 리서치의 신뢰성을 높일 수 있는 방법이다."]},
  {n:56, t:"기업이미지의 SWOT 분석에 대한 설명으로 틀린 것은?", opts:["강점 요인","약점 요인","기회 요인","포지셔닝"]},
  {n:57, t:"시장 세분화의 기준 중 행동 분석적 속성의 변수는?", opts:["사회계층","라이프 스타일","상표 충성도","개성"]},
  {n:58, t:"시장 세분화 방법에 대한 설명으로 틀린 것은?", opts:["인구학적 속성 : 연령, 성별, 소득, 직업 등에 따른 세분화","지리적 속성 : 지역, 인구밀도, 도시규모 등에 따른 세분화","심리적 속성 : 사용경험, 사용량 등에 따른 세분화","행동분석적 속성 : 구매동기, 가격민감도, 브랜드 충성도 등에 따른 세분화"]},
  {n:59, t:"시장 세분화 기준의 분류가 잘못된 것은?", opts:["지리적 변수 – 지역, 인구밀도","심리적 변수 – 생활환경, 종교","인구학적 변수 – 소득, 직업","행동분석적 변수 – 사용경험, 브랜드 충성도"]},
  {n:60, t:"시장 세분화 조건으로 고려되어야 하는 것이 아닌 것은?", opts:["실행가능성","수익가능성","측정가능성","접근가능성"]},
  {n:61, t:"시장 세분화로 인한 기업의 이점이 아닌 것은?", opts:["소비자의 욕구, 구매동기 등을 파악할 수 있다.","기업의 강점과 약점 등을 평가하여 유리한 시장을 선택할 수 있다.","마케팅 지원을 효율적으로 배분할 수 있다.","기업이 제품 라인업을 축소해 기업의 수익을 증대할 수 있다."]},
  {n:62, t:"표적시장(target market) 이란 무엇인가?", opts:["기업이 제품이나 서비스를 마케팅하기 위해 선택한 특정 시장","기업이 제품이나 서비스를 판매하기 위해 선택한 특정 지역","기업이 제품이나 서비스를 개발하기 위해 선택한 특정 고객군","기업이 제품이나 서비스를 홍보하기 위해 선택한 특정 매체"]},
  {n:63, t:"표적시장 선택의 시장공략에 속하지 않는 마케팅은?", opts:["무차별적 마케팅","선택적 마케팅","차별적 마케팅","집중마케팅"]},
  {n:64, t:"표적시장 선택의 시장공략 중 무차별적 마케팅이란 무엇인가?", opts:["세분시장 간 차이를 무시하고 제품 하나로 전체 시장을 대상으로 판매하는 전략","표적시장을 선정하고, 그 시장에서 고객의 욕구와 요구사항에 부합하는 제품과 마케팅 전략을 구체적으로 수립하여 판매하는 전략","소수의 시장세분에서 시장 점유율을 높이기 위해 전략적으로 집중하는 것","모든 시장세분에서 동일한 제품과 마케팅 전략을 사용하는 것"]},
  {n:65, t:"STP(Segmentation Target Positioning) 전략에 대한 설명으로 가장 적합한 것은?", opts:["'목표 소비자를 결정하고 이들이 세분화될 수 있는가'를 살핀 다음, 포지셔닝을 해나가는 시장전략","'소비자 시장이 세분화될 수 있는가'를 설계하고 목표 소비자를 결정한 다음, 포지셔닝을 해나가는 시장전략","시장을 먼저 세분화하고 포지셔닝을 한 다음, 목표 소비자를 확정해 나가는 시장전략","포지셔닝을 분명히 해 두고 시장을 세분화한 다음, 목표 소비자를 확정해 나가는 시장전략"]},
  {n:66, t:"특정 정보를 빠르게 찾아보기 위해 일정한 순서나 계량적, 수치적 배열을 통해 정보를 구성하는 것을 무엇이라 하는가?", opts:["색인화","일반화","통계화","목차화"]},
  {n:67, t:"다음 중 색인(index)의 역할이 아닌 것은?", opts:["검색수단","비용절감","속도향상","자료목록"]},
  {n:68, t:"다음 중 디자인 가이드(design guide)에 대한 설명으로 틀린 것은?", opts:["다양한 프로젝트에서 디자인 방향성과 다양한 시안 작업을 위해 제작되는 가이드를 말한다.","디자인 가이드를 제작하면 일관된 디자인 콘셉트를 유지할 수 있고 관리와 활용이 용이해진다.","관리자는 관리와 활용이 가능하도록 교육을 꼭 이수해야 한다.","프로젝트 전반적으로 디자인 작업의 질과 효율성을 높일 수 있다."]},
  {n:69, t:"다음 중 디자인 프로젝트 결과 보고서를 구성하는 내용이 아닌 것은?", opts:["디자인 프로젝트 수행 목적","디자인 프로젝트 결과물의 개요","디자인 프로젝트 수행 추진 체제 및 일정","디자인 프로젝트 과정에 대한 내용"]},
  {n:70, t:"라이프 스타일의 측정방법인 AIO분석 내용으로 알맞은 것은?", opts:["활동(activity), 관심(interest), 의견(opinion)","능력(ability), 재고(inventory), 의견(opinion)","활동(activity), 재고(inventory), 주문(order)","능력(ability), 관심(interest), 주문(order)"]},
  {n:71, t:"데이터베이스 스키마(database schema)에서 정의하는 구조가 아닌 것은?", opts:["자료의 구조","자료의 표현방법","자료 간의 관계","자료의 신뢰도"]},
  {n:72, t:"데이터베이스 스키마(database schema)의 종류가 아닌 것은?", opts:["외부 스키마(external schema)","자료 스키마(data schema)","개념 스키마(conceptual schema)","내부 스키마(internal schema)"]},
  {n:73, t:"상표 등록출원 기관은?", opts:["중소기업청","특허청","과학기술처","시청"]},
  {n:74, t:"저작권법상 저작재산권의 보호기간은?", opts:["저작자의 생존하는 동안과 공표된 때부터 40년간","저작자가 생존하는 동안과 공표된 때부터 70년간","지작자가 생존하는 동안과 사망 후 40년간","저작자가 생존하는 동안과 사망 후 70년간"]},
  {n:75, t:"다음 중 디자인보호법에 관한 일반적 설명으로 틀린 것은?", opts:["\"디자인일부심사등록\"이란 디자인등록출원이 디자인 등록요건 중 일부만을 갖추고 있는지를 심사하여 등록하는 것을 말한다.","한 벌의 포크, 나이프, 숟가락처럼 함께 사용되는 물품은 함께 출원할 수 있다.","인터넷 홈페이지나 각종 프로그램의 GUI나 아이콘 등은 디자인출원을 통해 보호받을 수 있다.","아바타, 애니메이션과 같은 그래픽이미지는 영상화면에 나타나는 것으로 디자인출원 대상이 아니다."]},
  {n:76, t:"다음 중 특허정보검색서비스와 관련한 기관 중 무료로 사용이 가능한 사이트는?", opts:["한국특허정보원(KIPI) – http://www.kipris.or.kr","줌테크놀러지(브랜드워치) – http://www.brandwatch.co.kr","위즈도메인(WISDOMAIN) – http://www.wisdomain.com","마크프로 – http://www.markpro.co.kr"]},
  {n:77, t:"다음 중 특허정보검색서비스(KIPRIS)에서 검색할 수 없는 것은?", opts:["해외특허","해외상표","상품","특허·실용신안"]},
  {n:78, t:"다음 중 특허정보검색서비스(KIPRIS)에서 제공하는 국내 데이터 제공 범위가 다른 하나는?", opts:["특허·실용신안","디자인","상표","심판"]},
  {n:79, t:"다음 중 키프리스(KIPRIS)에서 제공하는 해외 특허 데이터 제공 범위가 다른 나라는?", opts:["영국","프랑스","일본","카나다"]},
  {n:80, t:"다음 중 키프리스(KIPRIS) 단계별 검색방법에서 '자동차'와 '엔진' 두 키워드를 모두 함하여 검색할 경우 검색식으로 올바른 것은?", opts:["자동차*엔진","자동차+엔진","자동차*!엔진","자동차&엔진"]},
  {n:81, t:"특허, 상표에 관하여 특허청 및 법원에 대하여야 할 사항의 대리 및 그 사항에 관한 감정, 기타 사무를 하는 사람은?", opts:["광고주 담당자","번호사","건축사","변리사"]},
  {n:82, t:"다음 중 지식재산권 확보의 중요성이 아닌것은?", opts:["시장에서 독점적 지위 확보","자신의 재산권을 무한적으로 보호","R&D 투자비 회수 및 향후 추가 기술개발의 원천","분쟁예방 및 권리보호"]},
  {n:83, t:"상표와 상호에 관한 설명으로 틀린 것은?", opts:["상표는 자기의 상품을 타인의 상품과 식별하기 위하여 상품에 부착하는 표장이다.","상호는 법인이나 개인이 영업상 주체를 표시하는 명칭이다.","상표는 상표법(특허청)의 적용을 받고 상호는 세법(세무서)의 적용을 받는다.","상호는 명칭일 뿐이지만 상표는 문자뿐 아니라 도형, 캐릭터 등도 될 수 있다."]},
  {n:84, t:"디자인권이 발생하는 시기는?", opts:["설정등록 시","디자인 등록 출원 시","등록공고 시","출원공개 시"]},
  {n:85, t:"브리프(brief)란 무엇인가?", opts:["프로젝트의 목적, 목표, 타깃 대상, 예산 등을 상세하게 정리하고 공유하는 문서나 회의를 상세하게 정리하는 문서","프로젝트의 진행 상황을 정리하는 문서","프로젝트의 결과를 정리하는 문서","프로젝트의 디자인 방향성을 제시하는 문서"]},
  {n:86, t:"다음 중 특허정보에 대한 선행디자인 조사와 관련해 검색 수단으로 관계가 적은 것은?", opts:["한국특허청보원/특허청보검색서비스(KIPRIS)","윕스(WIPS)","한국표준협회(KSA)","마크프로(markpro)"]},
  {n:87, t:"저작권법에서 사용하는 용어의 뜻으로 올바르지 않은 것은?", opts:["\"저작물\"은 인간의 사상 또는 감정을 표현한 창작물을 말한다.","\"실연자\"는 저작물을 창작한 자들을 말한다.","\"음반\"은 음(음성·음향)을 말한다. 이하 같다이 유형물에 고정된 것(음을 디지털화한 것을 포함한다)을 말한다.","\"방송\"은 공중송신 중 공중이 동시에 수신하게 할 목적으로 음·영상 또는 음과 영상 등을 송신하는 것을 말한다."]},
  {n:88, t:"실용신안법의 보호대상인 것은?", opts:["전자를 응용하여 처음으로 전화기를 개발하였다.","전화기 외관의 형상과 색채를 남다르게 디자인하였다.","분리된 송·수화기를 일체화시키는 개발을 하였다.","기억에 남고 쉽게 부를 수 있는 전화기 명칭을 개발했다."]},
  {n:89, t:"다음 중 상표등록을 받을 수 없는 자는?", opts:["국내에서 상표를 사용하는 자","국내에서 상표를 사용하고자 하는 자","우중의 경우의 특허심판원식원","상속이 아닌 경우의 특허청직원"]},
  {n:90, t:"상표등록에 대한 설명으로 틀린 것은?", opts:["선원주의를 원칙으로 한다.","한번 등록된 상표는 매년 개신하여야 한다.","부정경쟁 방지와 고유가치를 보호하기 위한 제도이다.","상표의 권리 화립과 보호를 위해 신속하게 등록하여야 한다."]},
  {n:91, t:"실용신안등록 출원서에 기재해야 할 사항이 아닌 것은?", opts:["고안의 명칭","고안의 간단한 설명","도면의 간단한 설명","실용신안등록 청구범위"]},
  {n:92, t:"넓은 의미의 상표출원이 아닌 것은?", opts:["증명표장 출원","단체표장 출원","업무표장 출원","상장 출원"]},
  {n:93, t:"주지상표 여부의 판단요소가 아닌 것은?", opts:["상표의 사용기간","대출 및 시장점유율","상표의 사용방법","우통기한 표시"]},
  {n:94, t:"상표법상 등록이 안 되는 것은?", opts:["동양화로 직접 그린 '난(蘭)'을 컴퓨터그래픽으로 축소해서 상표 등록을 받고자 한다.","'친구친구'라는 의미로 숫자 '7979'를 상표로 등록하고자 한다.","잠이 깨는 검을 한글로 '잇'이라고 등록하고자 한다.","할머니의 사진을 컴퓨터그래픽을 활용해서 상표로 등록하고자 한다."]},
  {n:95, t:"상표법에 관한 설명으로 틀린 것은?", opts:["상표사용자의 업무상의 신용유지를 도모하여 산업발전에 이바지함과 아울러 수요자의 이익을 보호함을 목적으로 한다.","동일 또는 유사한 상품에 다른 날에 2건 이상의 상표등록출원이 있는 때에는 먼저 출원인의 협의에 의하여 정해진 하나의 출원인만이 그 상표에 관하여 상표등록을 받을 수 있다.","같은 날에 2건 이상의 상표등록출원이 있는 때에는 출원인의 협의에 의하여 정해진 하나의 출원인만이 그 상표에 관하여 상표등록을 받을 수 있다.","협의가 성립되지 않거나 협의를 할 수 없는 때에는 심의위원회에서 결정된 하나의 출원인만이 상표등록을 받을 수 있다."]},
  {n:96, t:"다음 중 상표의 기능이 아닌 것은?", opts:["품질보증 기능","광고선전 기능","재산적 기능","현상표시 기능"]},
  {n:97, t:"상표에 대한 설명 중 옳지 않은 것은?", opts:["상표는 문자만으로 표시되고 호칭되어야 한다.","상표는 자타상품 식별기능, 출처표시기능, 품질보증기능, 광고적 기능을 가진다.","상표권은 구성요소를 갖춘 상표가 상표법상 등록요건을 만족시킬 때 설정등록에 의해 발생한다.","상표는 독점배타성, 공익성, 탄력성이 있는 반영구적인 무체재산권이다."]},
  {n:98, t:"다음 중 디자인등록까지의 절차가 올바른 것은?", opts:["디자인등록 가능성 검토→출원준비→심사→보정서 및 의견서 제출→디자인출원→디자인 결정→등록비용 납부→등록증 발급","디자인등록 가능성 검토→출원준비→디자인출원→심사→보정서 및 의견서 제출→디자인 결정→등록비용 납부→등록증 발급","디자인등록 가능성 검토→보정서 및 의견서 제출→출원준비→심사→디자인출원→디자인 결정→등록비용 납부→등록증 발급","출원준비→디자인등록 가능성 검토→디자인출원→심사→보정서 및 의견서 제출→디자인 결정→등록비용 납부→등록증 발급"]},
  {n:99, t:"다음 중 상표권에서 상표등록을 받을 수 있는 상표는?", opts:["국가의 국기(國旗) 및 국제기구의 기장(記章) 등","상품을 생산·제조·가공·판매하거나 서비스를 제공하는 자가 공동으로 설립한 법인 상표","국가·인종·민족·공공단체·종교 또는 저명한 고인(故人)과의 관계를 거짓으로 표시하거나 이들을 비방 또는 모욕하거나 이들에 대한 평판을 나쁘게 할 우려가 있는 상표","특정 지역의 상품을 표시하는 것이라고 수요자들에게 널리 인식되어 있는 타인의 지리적 표시와 동일·유사한 상표로 또는 그 지리적 표시를 사용하는 상품과 동일하다고 인정되어 있는 상품에 사용하는 상표"]},
  {n:100, t:"다음 중 상표권의 효력이 미치지 아니하는 범위로 틀린 것은?", opts:["자기의 성명·명칭 또는 상호·초상·서명·인장 또는 저명한 아호·예명·필명과 이들의 저명한 약칭을 상거래 관행에 따라 사용하는 상표","등록상표의 지정상품과 동일·유사한 상품에 대하여 관용하는 상표와 현저한 지리적 명칭 및 그 약어 또는 지도로 된 상표","등록상표의 지정상품과 동일·유사한 상품의 보통명칭·산지·품질·원재료·효능·용도·수량·형상·가격 또는 생산방법·가공방법·사용방법 및 시기를 보통으로 사용하는 방법으로 표시하는 상표","국내에서 상표를 사용하는 자 또는 사용하려는 자의 상표"]},
  {n:101, t:"상표권에 관한 내용 중 틀린 것은?", opts:["상표권의 존속기간은 상표권의 설정 등록이 있는 날부터 10년으로 한다.","상표사용자의 업무상의 신용 유지를 도모하여 산업발전에 이바지하고 수요자의 이익보호를 목적으로 한다.","상표권의 존속기간은 상표권의 존속기간 갱신등록신청에 따라 5년씩 갱신할 수 있다.","상품의 품질을 오인하게 할 우려가 있는 자를 기반할 염려가 있는 것은 상표등록을 받을 수 없다."]},
  {n:102, t:"다음 중 상표권에서 상표등록을 받을 수 있는 요건에 해당하지 않는 것은?", opts:["상품의 보통명칭을 보통으로 사용하는 방법으로 표시한 표장만으로 된 상표","현저한 지리적 표장이나 그 약어(略語) 또는 지도만으로 된 상표","저명한 타인의 성명·명칭 또는 상호·초상·서명등","흔히 있는 성(姓) 또는 명칭을 보통으로 사용하는 방법으로 표시한 표장만으로 된 상표"]},
  {n:103, t:"다음중 저작재산권의 보호기간으로 옳은 것은?", opts:["저작자의 생존하는 동안과 공표된 때부터 50년간","저작자의 생존하는 동안과 사망 후 50년간","저작자의 생존하는 동안과 공표된 때부터 70년간","저작자의 생존하는 동안과 사망 후 70년간"]},
  {n:104, t:"저작자는 저작물의 원본이나 그 복제물에 또는 저작물의 공표 매체에 그의 실명 또는 이명을 표시할 권리를 무엇이라 하는가?", opts:["성명표시권","동일성 유지권","복제권","공연권"]},
  {n:105, t:"저작권법상 공동저작물의 저작인격권에 대한 설명으로 틀린 것은?", opts:["공동저작물의 저작인격권은 저작자 한 명이라도 합의하면 행사할 수 있다.","공동저작물의 저작자는 그들 중에서 저작 인격권을 대표하여 행사할 수 있는 자를 정할 수 있다.","권리를 대표하여 행사하는 자의 대표권에 가하여진 제한이 있을 때에 그 제한은 선의의 제3자에게 대항할 수 없다.","저작자는 신의에 반하여 합의의 성립을 방해할 수 없다."]},
  {n:106, t:"다음 중 저작재산권과 내용의 연결이 틀린 것은?", opts:["복제권 – 저작자는 그의 저작물을 복제할 권리를 가진다.","공연권 – 저작자는 그의 저작물을 공연할 권리를 가진다.","전시권 – 저작자는 미술저작물 등의 원본이나 그 복제물을 전시할 권리를 가진다.","수익권 – 저작자는 그의 저작물로부터 수익을 낼 권리를 가진다."]},
  {n:107, t:"다음 중 공동저작물의 저작재산권의 보호기간으로 옳은 것은?", opts:["저작자의 생존하는 동안과 공표된 때부터 50년간","저작자의 사망 후 50년간","저작자의 생존하는 동안과 공표된 때부터 70년간","맨 마지막으로 사망한 저작자가 사망한 후 70년간"]},
  {n:108, t:"다음 중 공동저작물들의 보호기간으로 틀린 것은?", opts:["무명 또는 이명 저작물의 보호기간은저작 재산권은 공표된 때부터 70년간 존속","업무상 저작물의 저작재산권은 공한 때부터 70년간 존속","영상저작물의 저작재산권은 사망한 때부터 70년간 존속","공동저작물의 저작재산권은 맨 마지막으로 사망한 저작자가 사망한 후 70년간 존속"]},
  {n:109, t:"다음 중 저작인접권에서 실연의 보호를 받지 못하는 것은?", opts:["대한민국 국민이 행하는 실연","대한민국이 가입 또는 체결한 조약에 따라 보호되는 실연","음반에 고정된 실연","송신 전에 녹음 또는 녹화되어 있는 실연"]},
  {n:110, t:"다음 중 저작인접권에서 규정하는 보호 대상이 아닌 것은?", opts:["실연","음반","디자인","방송"]},
  {n:111, t:"다음 중 저작인접권과 관련한 국제조약은?", opts:["베른 협약","로마협약","세계지작원 협약","저작권 조약"]},
  {n:112, t:"상표법의 목적과 거리가 가장 먼 것은?", opts:["상표의 보호","수요자의 이익보호","상표의 타켓팅 및 포지셔닝","상표 사용자의 업무상 신용유지"]},
  {n:113, t:"실용신안의 보호대상이 되는 것은?", opts:["선","마크","휴대용 라디오 이어폰","게임"]},
  {n:114, t:"상표보호법 제33조 상표등록의 요건에 포함되지 않는 것은?", opts:["간단하고 흔히 있는 표장만으로 된 경우","저명한 국제기관이 자기의 표정을 상표 등록 출원한 경우","흔히 있는 성(姓) 또는 명칭을 보통으로 사용하는 방법으로 표시한 표장만으로 된경우","타인의 상품을 표시하는 것이라고 수요자들에게 널리 인식되어 있는 경우"]},
  {n:115, t:"상표등록을 받기에 가장 적합한 것은?", opts:["사과주스의 상표를 '사과주스'로 신청하였다.","어린이 치즈의 상표를 '베스트(best)'로 신청하였다.","소주 상표로 '안동소주'를 신청하였다.","비누 상표로 '슈퍼(super)'와 '버블(bubble)'을 결합한 '슈퍼블'로 신청하였다."]},
  {n:116, t:"매슬로(Maslow)는 동기부여 이론에서 인간욕구를 5단계로 구분하였다. 다음 중 가장 상위 욕구는?", opts:["안전의 욕구","사회적 욕구","자아실현의 욕구","존경의 욕구"]},
  {n:117, t:"마케팅 개념을 가장 올게 설명한 것은?", opts:["마케팅 개념은 기업이 가장 잘 만족시킬 수 있는 소비자 집단을 규정하고 유도하는 활동을 말한다.","마케팅은 소비자의 이익과 관련하여 발생하는 활동을 의미한다.","마케팅은 기업 측과 협력하는 소비자 집단을 말한다.","시장에서의 교환을 통하여 인간의 필요와 욕구 만족 및 기업의 생존과 성장 목적을 달성하는 것이다."]},
  {n:118, t:"매슬로(Maslow)의 인간욕구 단계 중 첫 번째로 요구되는 욕구는?", opts:["생리적 욕구","안전에 대한 욕구","사회적 욕구","자아실현의 욕구"]},

  {n:183, t:"사진이나 필름 등의 이미지를 스캐너로 입력을 받는 경우, 규칙적으로 배열된 선, 점, 동심원 등의 모양이 중첩되어 나타나는 간섭으로 만들어진 줄무늬나 얼룩반점을 무엇이라 하는가?", opts:["프레이밍(framing)","크로핑(cropping)","블러(blur)","모아레(moire)"]},

  {n:194, t:"광화학적 방법으로 제판하는 방식이 아닌 것은?", opts:["연판","선화판","망점판","콜로타이프"]}
];

// State
let userAnswers = JSON.parse(localStorage.getItem('quizAnswers') || '{}');
let currentFilter = 'all';

function saveState() {
  localStorage.setItem('quizAnswers', JSON.stringify(userAnswers));
}

function getStats() {
  let correct = 0, wrong = 0;
  QUESTIONS.forEach(q => {
    if (userAnswers[q.n] !== undefined) {
      if (userAnswers[q.n] === ANSWERS[q.n]) correct++;
      else wrong++;
    }
  });
  return { correct, wrong, remain: 194 - correct - wrong };
}

function updateStats() {
  const s = getStats();
  document.getElementById('sumCorrect').textContent = s.correct;
  document.getElementById('sumWrong').textContent = s.wrong;
  document.getElementById('sumRemain').textContent = s.remain;
  document.getElementById('scoreDisplay').textContent = `${s.correct} / 194`;
  document.getElementById('cntUnanswered').textContent = `(${s.remain})`;
  document.getElementById('cntWrong').textContent = `(${s.wrong})`;
  document.getElementById('cntCorrect').textContent = `(${s.correct})`;
  const answered = s.correct + s.wrong;
  document.getElementById('progressFill').style.width = (answered / 194 * 100).toFixed(1) + '%';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuestions();
}

function getFilteredQuestions() {
  return QUESTIONS.filter(q => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'unanswered') return userAnswers[q.n] === undefined;
    if (currentFilter === 'wrong') return userAnswers[q.n] !== undefined && userAnswers[q.n] !== ANSWERS[q.n];
    if (currentFilter === 'correct') return userAnswers[q.n] === ANSWERS[q.n];
    return true;
  });
}

function renderQuestions() {
  const list = document.getElementById('quizList');
  const filtered = getFilteredQuestions();
  
  if (filtered.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:48px;color:var(--text-dim);font-size:14px;">해당 문제가 없습니다.</div>`;
    return;
  }
  
  list.innerHTML = filtered.map(q => renderCard(q)).join('');
  updateStats();
}

function renderCard(q) {
  const answered = userAnswers[q.n] !== undefined;
  const isCorrect = answered && userAnswers[q.n] === ANSWERS[q.n];
  const isWrong = answered && !isCorrect;
  
  const opts = q.opts.map((opt, i) => {
    const idx = i + 1;
    const isSelected = userAnswers[q.n] === idx;
    const isAnswerCorrect = idx === ANSWERS[q.n];
    let cls = 'opt';
    if (answered) {
      cls += ' disabled';
      if (isAnswerCorrect) cls += ' correct';
      else if (isSelected && !isAnswerCorrect) cls += ' wrong';
    } else if (isSelected) {
      cls += ' selected';
    }
    return `<div class="${cls}" onclick="selectAnswer(${q.n}, ${idx})">
      <div class="opt-num">${idx}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join('');
  
  const textLines = q.t.split('\n');
  const mainText = textLines[0];
  const boxText = textLines.length > 1 ? `<div class="q-box">${textLines.slice(1).join('<br>')}</div>` : '';
  
  let resultBadge = '';
  if (answered) {
    if (isCorrect) resultBadge = `<div class="result-badge correct-badge">✓ 정답</div>`;
    else resultBadge = `<div class="result-badge wrong-badge">✗ 오답 — 정답: ①②③④`
      .replace('①②③④', ['①','②','③','④'][ANSWERS[q.n]-1]) + `</div>`;
  }
  
  return `<div class="q-card${answered ? ' answered' : ''}" id="qcard-${q.n}">
    <div class="q-header">
      <span class="q-num">${q.n}</span>
      <div class="q-text">${mainText}</div>
    </div>
    ${boxText}
    <div class="options">${opts}</div>
    ${resultBadge}
  </div>`;
}

function selectAnswer(qn, idx) {
  if (userAnswers[qn] !== undefined) return;
  userAnswers[qn] = idx;
  saveState();
  // Re-render just this card
  const q = QUESTIONS.find(q => q.n === qn);
  const card = document.getElementById('qcard-' + qn);
  if (card) {
    card.outerHTML = renderCard(q);
  }
  updateStats();
  // Update filter counts
  updateFilterCounts();
  // If filtering, may need to hide answered card
  if (currentFilter === 'unanswered') {
    setTimeout(() => {
      const el = document.getElementById('qcard-' + qn);
      if (el) el.style.display = 'none';
    }, 800);
  }
}

function updateFilterCounts() {
  const s = getStats();
  document.getElementById('cntUnanswered').textContent = `(${s.remain})`;
  document.getElementById('cntWrong').textContent = `(${s.wrong})`;
  document.getElementById('cntCorrect').textContent = `(${s.correct})`;
}

function resetAll() {
  if (!confirm('모든 답변을 초기화하시겠습니까?')) return;
  userAnswers = {};
  saveState();
  renderQuestions();
}

function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  localStorage.setItem('quizTheme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
}

// Init
const savedTheme = localStorage.getItem('quizTheme');
if (savedTheme === 'light') {
  document.body.classList.add('light');
  document.getElementById('themeBtn').textContent = '🌙';
}

renderQuestions();
</script>
