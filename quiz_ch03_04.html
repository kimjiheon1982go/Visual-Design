<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT 모의고사 — 디자인 관리 · 시장조사 · 포지셔닝</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #12202e;
    --cream: #f4f7fb;
    --warm: #fdfeff;
    --accent: #1a5276;
    --accent2: #2e86c1;
    --gold: #d4ac0d;
    --gold-light: #f0c14b;
    --muted: #6c7a89;
    --border: #c8d6e5;
    --correct: #1e8449;
    --correct-bg: #d5f5e3;
    --wrong: #922b21;
    --wrong-bg: #fdecea;
    --show: #1a5276;
    --show-bg: #d6eaf8;
    --opt-hover: #eaf2fb;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--ink);
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 24px rgba(0,0,0,.35);
  }
  .header-inner {
    max-width: 880px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-left { flex: 0 0 auto; }
  .header-badge {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 3px;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 13.5px;
    font-weight: 500;
    color: #fff;
    line-height: 1.4;
    white-space: nowrap;
  }
  .header-progress { flex: 1; }
  .prog-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(255,255,255,.45);
    margin-bottom: 5px;
  }
  .prog-track {
    height: 5px;
    background: rgba(255,255,255,.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--gold));
    border-radius: 3px;
    transition: width .4s ease;
    width: 0%;
  }
  .header-score {
    flex: 0 0 auto;
    text-align: right;
  }
  .score-big {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--gold-light);
    line-height: 1;
    display: block;
  }
  .score-label { font-size: 10px; color: rgba(255,255,255,.4); }

  /* ── BODY ── */
  .app-body {
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 24px 80px;
  }

  /* ── RESULT BANNER ── */
  .result-banner {
    display: none;
    background: var(--ink);
    color: #fff;
    border-radius: 6px;
    padding: 32px 40px;
    margin-bottom: 24px;
    text-align: center;
    animation: fadeUp .5s ease;
  }
  .result-banner.show { display: block; }
  .result-score {
    font-family: 'DM Serif Display', serif;
    font-size: 58px;
    color: var(--gold-light);
    line-height: 1;
    margin-bottom: 6px;
  }
  .result-sub { font-size: 12px; color: rgba(255,255,255,.5); margin-bottom: 16px; }
  .result-grade {
    display: inline-block;
    padding: 6px 22px;
    border: 1px solid var(--gold);
    border-radius: 2px;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: .08em;
  }
  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 36px;
    margin-top: 22px;
  }
  .rb { text-align: center; }
  .rb-num {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .rb-num.c { color: #58d68d; }
  .rb-num.w { color: #ec7063; }
  .rb-num.s { color: rgba(255,255,255,.35); }
  .rb-label { font-size: 11px; color: rgba(255,255,255,.4); }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--warm);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: box-shadow .2s;
    animation: fadeUp .3s ease both;
  }
  .q-card:hover { box-shadow: 0 3px 20px rgba(18,32,46,.08); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .q-card:nth-child(1)  { animation-delay:.02s; }
  .q-card:nth-child(2)  { animation-delay:.04s; }
  .q-card:nth-child(3)  { animation-delay:.06s; }
  .q-card:nth-child(4)  { animation-delay:.08s; }
  .q-card:nth-child(5)  { animation-delay:.10s; }
  .q-card:nth-child(6)  { animation-delay:.12s; }
  .q-card:nth-child(7)  { animation-delay:.14s; }
  .q-card:nth-child(8)  { animation-delay:.16s; }
  .q-card:nth-child(9)  { animation-delay:.18s; }
  .q-card:nth-child(10) { animation-delay:.20s; }

  .q-head {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #f0f6ff 0%, #fafcff 100%);
  }
  .q-num {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--accent);
    min-width: 34px;
    line-height: 1;
    padding-top: 2px;
    opacity: .7;
  }
  .q-meta { flex: 1; }
  .q-tag {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 7px;
  }
  .q-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.78;
    color: var(--ink);
  }

  /* ── OPTIONS ── */
  .q-opts { padding: 4px 0 6px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 22px;
    cursor: pointer;
    transition: background .15s;
    border-bottom: 1px solid rgba(200,214,229,.35);
  }
  .opt:last-child { border-bottom: none; }
  .opt:hover:not(.disabled) { background: var(--opt-hover); }
  .opt.disabled { cursor: default; }
  .opt-label {
    min-width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: all .2s;
    margin-top: 1px;
  }
  .opt-text {
    font-size: 13.5px;
    line-height: 1.72;
    color: #2c3e50;
    padding-top: 2px;
  }

  /* STATE */
  .opt.selected .opt-label { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .opt.selected { background: #eaf4fd; }
  .opt.correct { background: var(--correct-bg); }
  .opt.correct .opt-label { background: var(--correct); border-color: var(--correct); color: #fff; }
  .opt.correct .opt-text { color: var(--correct); font-weight: 500; }
  .opt.wrong { background: var(--wrong-bg); }
  .opt.wrong .opt-label { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .opt.wrong .opt-text { color: var(--wrong); }
  .opt.show-correct { background: var(--show-bg); }
  .opt.show-correct .opt-label { background: var(--show); border-color: var(--show); color: #fff; }
  .opt.show-correct .opt-text { color: var(--show); font-weight: 500; }

  /* ── EXPLANATION ── */
  .q-explain {
    display: none;
    padding: 13px 22px 16px 60px;
    border-top: 1px dashed var(--border);
    background: #f0f5fc;
  }
  .q-explain.show { display: block; }
  .explain-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: .15em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 5px;
  }
  .explain-text { font-size: 13px; line-height: 1.82; color: #2c3e50; }

  /* ── BUTTONS ── */
  .submit-row { text-align: center; margin-top: 24px; }
  .btn-submit {
    background: var(--accent);
    color: #fff; border: none;
    padding: 14px 52px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer; border-radius: 4px;
    transition: background .2s, transform .1s;
  }
  .btn-submit:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-retry {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--ink);
    padding: 10px 34px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border-radius: 4px;
    margin-top: 12px;
    transition: background .2s;
    display: none;
  }
  .btn-retry:hover { background: var(--ink); color: #fff; }

  /* ── FLOAT ── */
  .float-ind {
    position: fixed; bottom: 22px; right: 22px;
    background: var(--ink); color: #fff;
    padding: 9px 16px; border-radius: 20px;
    font-size: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,.22);
  }
  .float-ind span { color: var(--gold-light); font-weight: 700; }

  @media (max-width: 600px) {
    .header-inner { flex-wrap: wrap; }
    .header-progress { order: 3; flex: 1 0 100%; }
    .q-head { padding: 16px 14px; }
    .opt { padding: 11px 14px; }
    .q-explain { padding: 12px 14px; }
    .header-title { font-size: 12px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-badge">시각디자인기사 CBT</div>
      <div class="header-title">디자인 관리 · 시장조사 · 포지셔닝</div>
    </div>
    <div class="header-progress">
      <div class="prog-row">
        <span>진행률</span>
        <span id="progLabel">0 / 25</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>
    <div class="header-score">
      <span class="score-big" id="scoreNum">—</span>
      <span class="score-label">점</span>
    </div>
  </div>
</header>

<div class="app-body">
  <div class="result-banner" id="resultBanner">
    <div class="result-score" id="resultScore">0</div>
    <div class="result-sub">25문항 · 문항당 4점 · 총 100점</div>
    <div class="result-grade" id="resultGrade">—</div>
    <div class="result-breakdown">
      <div class="rb"><span class="rb-num c" id="rbC">0</span><span class="rb-label">정답</span></div>
      <div class="rb"><span class="rb-num w" id="rbW">0</span><span class="rb-label">오답</span></div>
      <div class="rb"><span class="rb-num s" id="rbS">0</span><span class="rb-label">미응답</span></div>
    </div>
  </div>

  <div id="quizWrap"></div>

  <div class="submit-row">
    <button class="btn-submit" id="btnSubmit" onclick="submitQuiz()">채점하기</button><br>
    <button class="btn-retry" id="btnRetry" onclick="resetQuiz()">다시 풀기</button>
  </div>
</div>

<div class="float-ind"><span id="floatNum">0</span> / 25 응답</div>

<script>
const questions = [
  {
    tag: "디자인 관리 · 제1강",
    text: "기획과 계획의 관계에 대한 설명으로 가장 적절한 것은?",
    opts: [
      "기획은 계획에 따라 나타나는 결과이고, 계획은 사전준비 차원의 행위이다",
      "기획은 사전준비 차원의 행위이고, 계획은 기획에 따라 나타나는 결과이다",
      "기획과 계획은 완전히 동일한 의미로 구별 없이 사용된다",
      "계획은 아이디어를 내는 행위이고, 기획은 미래의 목표이다"
    ],
    ans: 1,
    exp: "계획은 미래의 목표이며, 그 목표를 위해 사전에 준비하는 행위·아이디어를 내는 행위를 기획이라 한다. 기획은 계획을 위한 사전준비 차원의 '행위'이고, 계획은 기획에 따라 나타나는 '결과'이다."
  },
  {
    tag: "디자인 관리 · 전략 개념",
    text: "전략(strategy)의 어원에 대한 설명으로 옳은 것은?",
    opts: [
      "라틴어 'politia'에서 유래하여 '국가의 운영'을 뜻한다",
      "고대 그리스어 '스트라테고스(strategos)'에서 유래하여 장군·지휘관을 의미한다",
      "산스크리트어 'Pur'에서 유래하여 '도시'를 뜻한다",
      "중세 영어 'policie'에서 유래하여 '정책'을 의미한다"
    ],
    ans: 1,
    exp: "전략은 '군대'를 뜻하는 stratis와 '끈다'는 ago가 결합하여 장군·지휘관을 의미하는 고대 그리스어 '스트라테고스(strategos)'에서 유래하였다."
  },
  {
    tag: "디자인 관리 · 프로세스",
    text: "디자인 관리 측면의 프로세스 순서로 가장 적절한 것은?",
    opts: [
      "계획 → 아이디어 수집 → 시장조사 → 아이디어 확정 → 시안 제작 → 프레젠테이션 → 생산/품질관리 → 종합평가",
      "시장조사 → 계획 → 아이디어 수집 → 아이디어 확정 → 프레젠테이션 → 시안 제작 → 생산/품질관리 → 종합평가",
      "계획 → 시장조사 → 아이디어 수집 → 아이디어 확정 → 시안 제작 → 프레젠테이션 → 생산/품질관리 → 종합평가",
      "계획 → 시장조사 → 시안 제작 → 아이디어 수집 → 아이디어 확정 → 프레젠테이션 → 생산/품질관리 → 종합평가"
    ],
    ans: 2,
    exp: "디자인 관리 프로세스: 계획 → 시장조사 → 아이디어 수집 → 아이디어 확정 → 시안 제작 → 프레젠테이션 → 생산/품질관리 → 종합평가"
  },
  {
    tag: "디자인 관리 · 디자인 정책",
    text: "디자인 정책(design policy)의 어원으로 가장 적절한 것은?",
    opts: [
      "고대 그리스어 'strategos' — 장군·지휘관",
      "라틴어 'ratio' — 이성·계획",
      "그리스어 'polis(폴리스)' — 도시국가",
      "산스크리트어 'karma' — 행위·결과"
    ],
    ans: 2,
    exp: "정책의 어원은 그리스어 'polis(폴리스)'로 '도시국가'를 뜻한다. 이후 라틴어 Politia → 중세 영어 policie로 변화하였다."
  },
  {
    tag: "디자인 관리 · 디자인 경영",
    text: "디자인 경영(design management)의 특성으로 가장 거리가 먼 것은?",
    opts: [
      "시각화(Visualization)와 유용성(Usability)에 기초를 둔다",
      "창의성(Creativity)과 감성(Emotion)을 경영기술로 활용한다",
      "전통적인 경영방식과 동일한 개념으로 수익 극대화만을 목표로 한다",
      "시뮬레이션(Simulation)과 기능성(Functionality)에 기초를 둔다"
    ],
    ans: 2,
    exp: "디자인 경영은 전통적인 경영방식과는 다른 개념으로, 시뮬레이션·시각화·유용성·기능성·창의성·감성 등의 경영기술과 디자인 프로세스에 기초를 두고 있다."
  },
  {
    tag: "시각 커뮤니케이션 · 시장조사",
    text: "시장조사(marketing research)의 3단계 방법으로 올바르게 나열된 것은?",
    opts: [
      "시장분석 → 시장실험 → 시장실사",
      "시장실사 → 시장분석 → 시장실험",
      "시장분석 → 시장실사 → 시장실험",
      "시장실험 → 시장분석 → 시장실사"
    ],
    ans: 2,
    exp: "시장조사 3단계: 시장분석(market analysis) → 시장실사(marketing survey) → 시장실험(test marketing). 시장분석은 시장 크기·경쟁사 동향 등을 조사하고, 시장실사는 출시 전 소비자 반응 수집, 시장실험은 실제 출시 후 성과 측정이다."
  },
  {
    tag: "시장조사 · 자료수집",
    text: "1차 자료(primary data)와 2차 자료(secondary data)에 대한 설명으로 옳은 것은?",
    opts: [
      "1차 자료는 과거에 다른 목적으로 수집된 자료이고, 2차 자료는 현재 목적에 맞게 직접 수집한 자료이다",
      "1차 자료는 시간·비용이 적게 들고, 2차 자료는 시간·비용이 많이 든다",
      "1차 자료는 직접 조사·수집한 자료이고, 2차 자료는 과거 다른 연구목적으로 수집되어 현재 연구에 활용 가능한 자료이다",
      "1차 자료와 2차 자료는 동일한 의미로 구별 없이 사용된다"
    ],
    ans: 2,
    exp: "1차 자료는 기존의 2차 자료로부터 얻을 수 없어 직접 조사·수집한 자료이다. 2차 자료는 과거의 다른 연구목적으로 조사된 자료로 현재 연구에 활용 가능한 자료이다. 1차 자료는 2차 자료보다 시간·비용·노력이 더 많이 든다."
  },
  {
    tag: "시장조사 · 자료수집방법",
    text: "서베이법(survey method)에 해당하지 않는 것은?",

function buildQuiz() {
  const wrap = document.getElementById('quizWrap');
  wrap.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q${qi}`;

    const optsHTML = q.opts.map((o, oi) => `
      <div class="opt" id="opt_${qi}_${oi}" onclick="pick(${qi},${oi})">
        <div class="opt-label">${['①','②','③','④'][oi]}</div>
        <div class="opt-text">${o}</div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="q-head">
        <div class="q-num">${String(qi+1).padStart(2,'0')}</div>
        <div class="q-meta">
          <div class="q-tag">${q.tag}</div>
          <div class="q-text">${q.text}</div>
        </div>
      </div>
      <div class="q-opts">${optsHTML}</div>
      <div class="q-explain" id="exp_${qi}">
        <div class="explain-label">📌 해설</div>
        <div class="explain-text">${q.exp}</div>
      </div>
    `;
    wrap.appendChild(card);
  });
  updateUI();
}

function pick(qi, oi) {
  if (submitted) return;
  userAnswers[qi] = oi;

  for (let i = 0; i < questions[qi].opts.length; i++) {
    const el = document.getElementById(`opt_${qi}_${i}`);
    el.classList.remove('selected','correct','wrong','show-correct');
  }
  document.getElementById(`opt_${qi}_${oi}`).classList.add('selected');
  updateUI();
}

function updateUI() {
  const done = userAnswers.filter(a => a !== null).length;
  const pct = done / questions.length * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${done} / ${questions.length}`;
  document.getElementById('floatNum').textContent = done;
}

function submitQuiz() {
  submitted = true;
  let c = 0, w = 0, s = 0;

  questions.forEach((q, qi) => {
    const ua = userAnswers[qi];
    const ans = q.ans;
    for (let i = 0; i < q.opts.length; i++) {
      const el = document.getElementById(`opt_${qi}_${i}`);
      el.classList.remove('selected','correct','wrong','show-correct');
      el.classList.add('disabled');
    }
    if (ua === null) {
      s++;
      document.getElementById(`opt_${qi}_${ans}`).classList.add('show-correct');
    } else if (ua === ans) {
      c++;
      document.getElementById(`opt_${qi}_${ua}`).classList.add('correct');
    } else {
      w++;
      document.getElementById(`opt_${qi}_${ua}`).classList.add('wrong');
      document.getElementById(`opt_${qi}_${ans}`).classList.add('show-correct');
    }
    document.getElementById(`exp_${qi}`).classList.add('show');
  });

  const score = c * 4;
  let grade = '';
  if (score >= 80) grade = '🏆 우수 — 합격 안정권';
  else if (score >= 60) grade = '✅ 양호 — 조금 더 노력!';
  else if (score >= 40) grade = '📖 보통 — 복습이 필요합니다';
  else grade = '⚠️ 미흡 — 반복 학습 필요';

  document.getElementById('resultScore').textContent = score + '점';
  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('rbC').textContent = c;
  document.getElementById('rbW').textContent = w;
  document.getElementById('rbS').textContent = s;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('resultBanner').classList.add('show');
  document.getElementById('btnSubmit').style.display = 'none';
  document.getElementById('btnRetry').style.display = 'inline-block';
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progLabel').textContent = '25 / 25';
  document.getElementById('resultBanner').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
  userAnswers = new Array(questions.length).fill(null);
  submitted = false;
  document.getElementById('resultBanner').classList.remove('show');
  document.getElementById('btnSubmit').style.display = '';
  document.getElementById('btnRetry').style.display = 'none';
  document.getElementById('scoreNum').textContent = '—';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
